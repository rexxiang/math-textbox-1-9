plan_id: book-structure-polish-20260419-013427
focus_area: knowledge-tree-and-progression
summary: "当前知识树的主要顺序风险集中在三处：公共主干里坐标先于负数，几何深化里圆的度量先于勾股定理，二次主题在代数深化与函数模型之间分界不清，导致“并列分支”实际变成隐性串行依赖。"
structural_issues:
  - id: signed-coordinates-before-negative-numbers
    severity: critical
    files:
      - typst/main.typ
      - typst/03-geometry-foundation/05-coordinate-entry.typ
      - typst/04-number-line-algebra-bridge/01-rational-numbers.typ
    evidence: "权威顺序中 §3.5 早于 §4.1；但 §3.5 已使用 B(-2,2)、C(-1,-1.5) 和四象限正负号规则，而 §4.1 才正式引入负数、方向和带符号数轴。"
    violated_rules:
      - "typst/main.typ 是权威章节顺序，前置概念应先于依赖它的章节出现"
      - "公共基础应先稳固共同语言，再进入更抽象的桥接表达"
      - "章节目的应与其在知识树中的位置一致，不能提前消耗后章核心前置"
    suggested_fix: "将 §3.5 收缩为第一象限/方格定位入口，把四象限与负坐标移到 §4.1 之后，或把完整坐标平面内容整体后移到数轴与正负数建立之后。"
  - id: circles-use-pythagorean-before-it-is-taught
    severity: high
    files:
      - typst/main.typ
      - typst/07-geometry-deepening/00-overview.typ
      - typst/07-geometry-deepening/04-circles.typ
      - typst/07-geometry-deepening/05-pythagorean-theorem.typ
    evidence: "§7.4 例 2 直接用 OH = sqrt(5^2 - 4^2) 求弦心距，并把圆题常见转化写成“作垂线→全等或勾股”；但 §7.5 才正式引入勾股定理。"
    violated_rules:
      - "同一分支内应遵守前置先行，后置工具不能在前章被当作已学内容"
      - "章节主线应与分支推进顺序一致，不能在“圆”中先偷用后续“长度发动机”"
    suggested_fix: "要么把 §7.5 前移到 §7.4 之前，要么保留顺序但删除 §7.4 中依赖勾股的度量例题，把弦心距等计算挪到 §7.5 或 §7.9。"
  - id: quadratic-split-breaks-parallel-branch-logic
    severity: critical
    files:
      - typst/05-foundation-gate/02-branch-entry-recaps.typ
      - typst/06-algebra-deepening/00-overview.typ
      - typst/06-algebra-deepening/06-quadratic-equations.typ
      - typst/08-function-models/00-overview.typ
      - typst/08-function-models/03-quadratic-functions.typ
      - typst/10-capstone/invention-tree.typ
    evidence: "§6.0 把 §6.6 明说为“接到抛物线问题上”，§6.6 危机也用抛体高度模型开场；而 §8.3 又写明精确求 x 轴交点要沿用前面学过的因式分解/求根公式。可 §5.2 与 §8.0 的函数入口回看只列主干前置，没有显式列出 §6.6。终章又声明 06-09 是并列分支而非单行道。"
    violated_rules:
      - "分支脊椎要求 06-09 作为并列专题深化路线，而不是隐性串行链"
      - "分支入口 recap 只能唤醒旧工具，不能把兄弟分支依赖藏成默认前提"
      - "章节 stated purpose 应与全书知识树位置一致，二次主题边界不能同时被两条分支抢占"
    suggested_fix: "先明确二次主题归属：若 8.3 保持函数分支独立，就把它改成图像/最值/对称为主并去掉对 §6.6 的默认依赖；若保留精确求根依赖，就必须在 05.2 与 08.0 显式声明 06.6 是先修，并重写 06.6 的抛物线导向。"
candidate_tasks:
  - id: split-coordinate-entry-from-signed-plane
    title: "拆分坐标入门与带符号坐标平面"
    description: "重构 03-geometry-foundation/05-coordinate-entry.typ：保留不依赖负数的定位入口，把四象限、负坐标、带符号位置语言迁移到 04-number-line-algebra-bridge。"
    dependencies: []
  - id: repair-circle-pythagorean-order
    title: "修复圆与勾股定理的先后顺序"
    description: "决定是调整 07 章内部顺序，还是保留现顺序但清除 §7.4 中所有对勾股定理的显性依赖，并把相关度量题集中到后续位置。"
    dependencies: []
  - id: decide-quadratic-boundary-between-06-and-08
    title: "确定二次主题在 06 与 08 之间的边界"
    description: "明确一元二次方程与二次函数各自负责什么、哪些应用属于代数分支、哪些属于函数分支，避免“抛物线”同时充当两章核心入口。"
    dependencies: []
  - id: align-gate-and-function-prerequisites
    title: "对齐闸门回看与函数分支先修说明"
    description: "在二次主题边界确定后，同步修订 05.2、08.0、08.3 的入口描述，使函数分支的先修关系与实际内容一致。"
    dependencies:
      - decide-quadratic-boundary-between-06-and-08
