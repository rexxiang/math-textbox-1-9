plan_id: book-structure-polish-20260419-013427
focus_area: spine-and-special-sections
summary: >-
  00-09 largely match the required spine: 00 remains outside the正文脊椎, 01-04 act as公共基础,
  05 behaves as收束闸门而非新课, and 06-09 place their branch-entry recap blocks in the required
  position after #history-note and before the chapter route list. The highest-signal gaps are that
  chapter 10 does not currently expose a standard whole-book summary/review node before the outlook,
  and the branch-readiness contract is not fully consistent between 05.2 and the local 06-08 entry recaps.
structural_issues:
  - id: capstone-missing-whole-book-summary-node
    severity: high
    files:
      - typst/main.typ
      - typst/10-capstone/00-overview.typ
      - typst/10-capstone/invention-tree.typ
      - typst/10-capstone/whats-next.typ
      - .agents/skills/math-textbook-authoring/SKILL.md
    evidence: >-
      The rules require 全书总结 → 后续展望, and the authoring skill says each chapter should end with
      an XX-review.typ recap file. But typst/main.typ includes chapter 10 as only 00-overview.typ →
      invention-tree.typ → whats-next.typ, with no review.typ or equivalent whole-book recap node;
      00-overview lists only “完整发明树” and “高中数学展望”, so the chapter moves from framing to
      map/outlook without a standard summary closure.
    violated_rules:
      - 全书脊椎必须包含“全书总结 → 后续展望”
      - 每章最后一个文件为章末回顾，统一四段结构
    suggested_fix: >-
      Add an explicit whole-book summary/review file under 10-capstone before whats-next.typ, and keep
      whats-next.typ as the pure 后续展望 node.
  - id: gate-and-branch-entry-contracts-diverge
    severity: medium
    files:
      - typst/05-foundation-gate/02-branch-entry-recaps.typ
      - typst/06-algebra-deepening/00-overview.typ
      - typst/07-geometry-deepening/00-overview.typ
      - typst/08-function-models/00-overview.typ
    evidence: >-
      The global gate recap and the local branch-entry recaps do not define the same prerequisite sets.
      For algebra, 05.2 checks 4.3/4.4/2.4, while 06-overview additionally requires 1.6. For geometry,
      05.2 checks 3.3/3.4/3.5/2.4, while 07-overview additionally depends on 3.2. For functions, 05.2
      emphasizes 4.1/3.5/2.4/4.3, while 08-overview swaps in 4.4 and reframes the prerequisite mix.
      This creates two overlapping transition nodes with partially different readiness contracts.
    violated_rules:
      - 05-foundation-gate should serve as the shared trunk-to-branch transition recap
      - 分支首章入口 recap 的目标是唤醒旧工具，形成清晰一致的入场过渡
    suggested_fix: >-
      Normalize each branch's prerequisite contract so 05.2 and the corresponding 06-09 entry recap
      point to the same minimal old-tool set, with local wording allowed but no conflicting checklists.
candidate_tasks:
  - id: add-capstone-summary-node
    title: Add explicit whole-book summary node in 10-capstone
    description: >-
      Create a dedicated whole-book recap/review file for chapter 10, place it before whats-next.typ in
      typst/main.typ, and let the final file remain a pure 后续展望 section.
    dependencies: []
  - id: unify-branch-readiness-contracts
    title: Unify branch entry prerequisite contracts
    description: >-
      Reconcile 05-foundation-gate/02-branch-entry-recaps.typ with the 06-09 overview recap blocks so
      each branch has one consistent prerequisite inventory from gate to local branch entry.
    dependencies: []
