objective: "Audit the book spine, chapter ordering, and chapter/directory topology against AGENTS.md and typst/main.typ."
focus_area: "Top-level spine; chapter ordering; first-level and second-level directory coverage; transitions across 01-04, 05, 06-09, 10."
inspected_files:
  - "AGENTS.md"
  - "typst/main.typ"
  - "typst/01-counting/00-overview.typ"
  - "typst/02-fraction-ratio-foundation/00-overview.typ"
  - "typst/03-geometry-foundation/00-overview.typ"
  - "typst/04-number-line-algebra-bridge/00-overview.typ"
  - "typst/04-number-line-algebra-bridge/02-real-numbers.typ"
  - "typst/04-number-line-algebra-bridge/05-review.typ"
  - "typst/05-foundation-gate/00-overview.typ"
  - "typst/05-foundation-gate/01-foundation-check.typ"
  - "typst/05-foundation-gate/02-branch-entry-recaps.typ"
  - "typst/06-algebra-deepening/00-overview.typ"
  - "typst/06-algebra-deepening/01-algebraic-expressions.typ"
  - "typst/07-geometry-deepening/00-overview.typ"
  - "typst/07-geometry-deepening/01-congruent-triangles.typ"
  - "typst/07-geometry-deepening/09-circle-extensions.typ"
  - "typst/08-function-models/00-overview.typ"
  - "typst/08-function-models/01-linear-functions.typ"
  - "typst/08-function-models/04-rate-change-models.typ"
  - "typst/09-data-statistics/00-overview.typ"
  - "typst/09-data-statistics/01-data-collection.typ"
  - "typst/09-data-statistics/05-probability.typ"
  - "typst/10-capstone/00-overview.typ"
  - "typst/10-capstone/review.typ"
  - "typst/10-capstone/whats-next.typ"

findings:
  - id: "F01"
    severity: "info"
    finding: "The first-level book spine matches the required structure, and typst/main.typ is synchronized with the on-disk chapter files."
    evidence:
      - path: "AGENTS.md"
        lines: "7-24"
        detail: "Defines the immutable spine: 01-04 public foundation, 05 foundation gate, 06-09 branch advanced, 10 capstone."
      - path: "typst/main.typ"
        lines: "21-132"
        detail: "Includes 00-gateway through 10-capstone in the expected order."
      - path: "typst/00-gateway .. typst/10-capstone"
        lines: "directory inventory"
        detail: "All included .typ files matched actual directory contents; no missing include targets or stray unincluded chapter files were found."
    proposed_actions:
      - "Keep the current first-level spine unchanged."
      - "Continue treating typst/main.typ as the single ordering authority."

  - id: "F02"
    severity: "medium"
    finding: "§4.2 is explicitly framed as a side window, but it occupies a full peer slot inside the bridge chapter, which weakens the bridge flow from signed numbers to algebra language."
    evidence:
      - path: "typst/04-number-line-algebra-bridge/00-overview.typ"
        lines: "28-34"
        detail: "Lists §4.2 as '实数的入口——作为补完整数轴的侧窗'."
      - path: "typst/04-number-line-algebra-bridge/02-real-numbers.typ"
        lines: "67-71"
        detail: "States that the section only does enough to place sqrt(2), pi, etc. on the number line and explicitly avoids becoming a full root-arithmetic unit."
      - path: "typst/main.typ"
        lines: "66-71"
        detail: "Places 4.2 directly between 4.1 signed numbers and 4.3/4.4 algebra-expression/equation bridge topics."
    proposed_actions:
      - "Either demote §4.2 to an interlude/appendix-style bridge note, or move it after §4.4 so the main bridge line stays 'signed numbers -> letters -> equations'."

  - id: "F03"
    severity: "high"
    finding: "The 05 -> 06 transition still has a major algebra difficulty cliff: gate prerequisites are light, but §6.1 immediately expands into a large bundle of symbolic manipulation topics."
    evidence:
      - path: "typst/05-foundation-gate/02-branch-entry-recaps.typ"
        lines: "34-38"
        detail: "06-entry checks only operation laws, ratio sense, writing quantities with letters, and balance intuition."
      - path: "typst/04-number-line-algebra-bridge/05-review.typ"
        lines: "29-40"
        detail: "Chapter 4 review still describes letters as templates and equations as very simple one-step balance problems."
      - path: "typst/06-algebra-deepening/01-algebraic-expressions.typ"
        lines: "62-111"
        detail: "§6.1 covers polynomial simplification, monomial/polynomial multiplication, multiplication formulas, power laws, and division in one opening chapter."
    proposed_actions:
      - "Split §6.1 into a lighter '整式入门/式子整理' bridge chapter plus a later formulas-and-powers chapter."
      - "If the split is not desired, insert an explicit transition chapter before current §6.1."

  - id: "F04"
    severity: "high"
    finding: "The 05 -> 07 transition also has a major proof cliff: the gate checks angle/parallel/coordinate readiness, but §7.1 immediately requires proof language and multiple congruence criteria."
    evidence:
      - path: "typst/05-foundation-gate/02-branch-entry-recaps.typ"
        lines: "41-45"
        detail: "07-entry checks ratio sense, area intuition, angle reading, parallel/perpendicular, and coordinates."
      - path: "typst/07-geometry-deepening/01-congruent-triangles.typ"
        lines: "26-32"
        detail: "Introduces formal proof structure ('已知 -> 判定 -> 结论')."
      - path: "typst/07-geometry-deepening/01-congruent-triangles.typ"
        lines: "65-77"
        detail: "Introduces SSS/SAS/ASA/AAS/HL and SSA caveat immediately in the first geometry-deepening section."
    proposed_actions:
      - "Add a pre-proof transition chapter before §7.1, or split current §7.1 into 'proof language / triangle basics' and 'congruence criteria'."

  - id: "F05"
    severity: "medium"
    finding: "Several topics described as side-window/optional material are still represented as full peer-level second-level chapters, which blurs core-vs-peripheral topology."
    evidence:
      - path: "typst/07-geometry-deepening/00-overview.typ"
        lines: "34-35"
        detail: "§7.9 is described as a side hall / elective extension, not a core node."
      - path: "typst/07-geometry-deepening/09-circle-extensions.typ"
        lines: "79-81"
        detail: "The file explicitly says it is not a required node in the main proof/measurement chain."
      - path: "typst/09-data-statistics/00-overview.typ"
        lines: "25-26"
        detail: "§9.5 probability is described as a side window beside the main data route."
      - path: "typst/main.typ"
        lines: "117-124"
        detail: "§9.5 still occupies a full peer slot equal to the core data sections."
    proposed_actions:
      - "Demote §7.9 and/or §9.5 to clearly marked interludes/appendices, or explicitly redefine them as core branch nodes in overview language."

  - id: "F06"
    severity: "medium"
    finding: "§8.4 is nominally an application-comparison chapter, but it already materializes an exponential-form expression, which blurs the stated boundary of the function branch."
    evidence:
      - path: "typst/08-function-models/00-overview.typ"
        lines: "9-9"
        detail: "The overview says the chapter should compare models and should not turn into a new family-heavy route."
      - path: "typst/08-function-models/04-rate-change-models.typ"
        lines: "95-117"
        detail: "The section formalizes rolling growth and writes y = 1000 × 1.05^t, crossing from comparison into an implicit exponential model."
    proposed_actions:
      - "Either keep §8.4 strictly at model-comparison level, or explicitly acknowledge a 'growth model' node in the branch topology."

open_risks:
  - "If §6.1 stays bundled as-is, the strongest structural cliff in the repository remains 05 -> 06."
  - "If §7.1 stays as the first proof-heavy node without a pre-proof bridge, 05 -> 07 remains the sharpest geometry transition."
  - "If side-window topics continue to consume peer-level chapter slots, future contributors may keep inflating peripheral topics without a visible core/peripheral distinction."
  - "Any reordering of §4.2, §7.9, §8.4, or §9.5 will require synchronized updates in typst/main.typ and in overview/review #secref references."
