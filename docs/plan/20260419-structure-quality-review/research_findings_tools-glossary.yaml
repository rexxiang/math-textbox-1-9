objective: "Analyze tool invention order, tool reuse order, glossary completeness, abbreviation coverage, and naming consistency for the Typst math textbook."
focus_area: "tools-glossary"
inspected_files:
  - AGENTS.md
  - typst/main.typ
  - typst/lib/theme-v2.typ
  - typst/00-gateway/symbols.typ
  - typst/02-fraction-ratio-foundation/01-factors-multiples.typ
  - typst/03-geometry-foundation/01-basic-shapes.typ
  - typst/03-geometry-foundation/03-angles.typ
  - typst/04-number-line-algebra-bridge/02-real-numbers.typ
  - typst/04-number-line-algebra-bridge/03-variables-and-expressions.typ
  - typst/06-algebra-deepening/02-factorization.typ
  - typst/07-geometry-deepening/01-congruent-triangles.typ
  - typst/07-geometry-deepening/02-similar-triangles.typ
  - typst/07-geometry-deepening/08-projections.typ
  - typst/08-function-models/01-linear-functions.typ
  - typst/09-data-statistics/02-central-tendency.typ
  - typst/09-data-statistics/03-variability.typ
  - typst/09-data-statistics/04-frequency-distribution.typ
  - typst/09-data-statistics/05-probability.typ

findings:
  - id: "tool-overload-candidates"
    severity: "critical"
    summary: "Multiple knowledge-point chapters appear to exceed the AGENTS.md limit of at most 3 invented tools per chapter."
  - id: "same-chapter-pre-explanation-use"
    severity: "high"
    summary: "Some chapters use notation or expressions before the same chapter explains them, creating future-tool leakage inside the chapter."
  - id: "glossary-coverage-sparse"
    severity: "critical"
    summary: "Glossary coverage is inconsistent: only 28 of 46 knowledge-point files contain #vocab, with the largest gaps in chapters 4, 8, and 9."
  - id: "abbreviation-rule-noncompliance"
    severity: "critical"
    summary: "Abbreviations are used without glossary entries that contain both the English full name and the abbreviation."
  - id: "glossary-surface-inconsistent"
    severity: "medium"
    summary: "The book uses both local #vocab side-notes and 00-gateway/symbols.typ, but symbols.typ is notation-oriented and does not cover terminology/abbreviation obligations."
  - id: "naming-depth-inconsistent"
    severity: "medium"
    summary: "Terminology naming depth is inconsistent: some entries use full English phrases, some use abbreviation only, and many sections define major terms with no glossary entry at all."

evidence:
  - finding_id: "tool-overload-candidates"
    items:
      - path: "AGENTS.md"
        lines: "11-13"
        note: "Authoritative rule: each knowledge-point chapter may invent at most 3 tools; tools used must be invented in that chapter or earlier."
      - path: "typst/03-geometry-foundation/01-basic-shapes.typ"
        lines: "4-6"
        note: "§3.1 vocab line lists 11 candidate invented terms: triangle, quadrilateral, circle, perimeter, rectangle, square, point, segment, ray, line, plane."
      - path: "typst/03-geometry-foundation/03-angles.typ"
        lines: "6"
        note: "§3.3 vocab line lists 8 candidate terms."
      - path: "typst/02-fraction-ratio-foundation/01-factors-multiples.typ"
        lines: "3-5, 36-46"
        note: "§2.1 introduces factor, multiple, prime, composite, GCD, LCM in one section."
      - path: "typst/07-geometry-deepening/08-projections.typ"
        lines: "3-5, 49-91"
        note: "§7.8 introduces projection, orthographic projection, three views, front view, top view, side view in one section."
      - path: "repo-scan"
        lines: "computed"
        note: "46 knowledge-point files; 21 files have more than 3 #vocab entries; top counts are 11, 8, 6, 6."

  - finding_id: "same-chapter-pre-explanation-use"
    items:
      - path: "typst/04-number-line-algebra-bridge/02-real-numbers.typ"
        lines: "24-49"
        note: "Discovery uses sqrt(2), sqrt(4), sqrt(9), pi, x^2, and irrational-number behavior before blueprint formally defines arithmetic square root / irrational / real number at lines 73-105."
      - path: "typst/04-number-line-algebra-bridge/03-variables-and-expressions.typ"
        lines: "21-46"
        note: "Discovery uses n, a, l, w, 6n+3, 4a, 2(l+w) before blueprint defines 字母表示数 and 代数式 at lines 62-103."
      - path: "typst/06-algebra-deepening/02-factorization.typ"
        lines: "7-16"
        note: "Crisis uses x^2 and factorized form immediately, but mitigates leakage by explicit back-reference to #secref(\"6.1\")."
      - path: "typst/07-geometry-deepening/01-congruent-triangles.typ"
        lines: "65-75"
        note: "Abbreviations SSS/SAS/ASA/AAS/HL/SSA appear in blueprint without glossary expansion."
      - path: "typst/07-geometry-deepening/02-similar-triangles.typ"
        lines: "48-52, 69"
        note: "AA/SAS/SSS appear in blueprint and worked example, but the file has no #vocab entry."

  - finding_id: "glossary-coverage-sparse"
    items:
      - path: "typst/lib/theme-v2.typ"
        lines: "138-140"
        note: "Local glossary mechanism exists via #vocab side-note."
      - path: "repo-scan"
        lines: "computed"
        note: "Only 28 of 46 knowledge-point files contain #vocab; 18 of 46 do not."
      - path: "typst/04-number-line-algebra-bridge"
        lines: "scan"
        note: "Only 01-rational-numbers.typ has #vocab; 02-real-numbers.typ, 03-variables-and-expressions.typ, 04-equation-intuition.typ do not."
      - path: "typst/08-function-models"
        lines: "scan"
        note: "Only 04-rate-change-models.typ has #vocab; 01-03 do not."
      - path: "typst/09-data-statistics"
        lines: "scan"
        note: "Only 06-sampling-estimation.typ has #vocab; 01-05 do not."
      - path: "typst/08-function-models/01-linear-functions.typ"
        lines: "73-153"
        note: "Defines function, 正比例函数, 一次函数, k, b with no local #vocab."
      - path: "typst/09-data-statistics/02-central-tendency.typ"
        lines: "59-100"
        note: "Defines 平均数 / 中位数 / 众数 with no local #vocab."
      - path: "typst/09-data-statistics/03-variability.typ"
        lines: "80-114"
        note: "Defines 极差 / 方差 with no local #vocab."
      - path: "typst/09-data-statistics/04-frequency-distribution.typ"
        lines: "64-120"
        note: "Defines 组距 / 频率分布表 / 频率分布直方图 / 频数 / 频率 with no local #vocab."
      - path: "typst/09-data-statistics/05-probability.typ"
        lines: "62-109"
        note: "Defines 概率 / 事件 / 样本空间 / 对立事件 / 理论概率 / 实验概率 with no local #vocab."

  - finding_id: "abbreviation-rule-noncompliance"
    items:
      - path: "typst/02-fraction-ratio-foundation/01-factors-multiples.typ"
        lines: "5, 44-46"
        note: "GCD and LCM appear, but glossary gives only abbreviation, not English full names."
      - path: "typst/07-geometry-deepening/01-congruent-triangles.typ"
        lines: "5, 65-75"
        note: "File vocab does not include SSS/SAS/ASA/AAS/HL/SSA; abbreviations appear in blueprint and later examples."
      - path: "typst/07-geometry-deepening/02-similar-triangles.typ"
        lines: "48-52, 69"
        note: "AA/SAS/SSS appear, but file has no #vocab."
      - path: "typst/00-gateway/symbols.typ"
        lines: "1-63"
        note: "Symbols table covers notation but not these abbreviation expansions."
      - path: "repo-search"
        lines: "full-text search"
        note: "No matches found for greatest common divisor, least common multiple, side-angle-side, side-side-side, angle-angle, angle-side-angle, angle-angle-side, hypotenuse-leg."

  - finding_id: "glossary-surface-inconsistent"
    items:
      - path: "typst/lib/theme-v2.typ"
        lines: "140"
        note: "#vocab exists as the intended local terminology surface."
      - path: "typst/00-gateway/symbols.typ"
        lines: "1-63"
        note: "Central reference exists, but it is symbol-based rather than term-based."
      - path: "typst/08-function-models/01-linear-functions.typ"
        lines: "1-153"
        note: "Major chapter-level terminology is introduced with no #vocab despite local mechanism existing."
      - path: "typst/09-data-statistics/02-central-tendency.typ"
        lines: "1-140"
        note: "Same inconsistency in statistics."

  - finding_id: "naming-depth-inconsistent"
    items:
      - path: "typst/02-fraction-ratio-foundation/01-factors-multiples.typ"
        lines: "5"
        note: "Entry uses abbreviation only: 最大公因数 GCD / 最小公倍数 LCM."
      - path: "typst/07-geometry-deepening/08-projections.typ"
        lines: "5"
        note: "Entry uses full English names: orthographic projection / three views / front view / top view / side view."
      - path: "typst/09-data-statistics/02-central-tendency.typ"
        lines: "59-100"
        note: "Section defines major terms but provides no bilingual glossary entry."
      - path: "typst/08-function-models/01-linear-functions.typ"
        lines: "85-120"
        note: "Section defines major terms but provides no bilingual glossary entry."

proposed_actions:
  - "Use a hard pre-merge check: no knowledge-point file may introduce more than 3 new tools/terms in blueprint+vocab combined."
  - "Split overloaded sections before editing details: §3.1, §3.3, §2.1, and §7.8 are the strongest current overload candidates."
  - "Require one of two patterns for every new expression in crisis/discovery: either plain-language placeholder first, or an explicit back-reference to an earlier section that already invented it."
  - "Treat #vocab as mandatory for every knowledge-point file that introduces named terms, not optional."
  - "For every glossary item with an abbreviation, store all three pieces together: Chinese term + English full name + abbreviation."
  - "Normalize geometry criteria as a dependency-safe sequence: define full English names once in §7.1/§7.2 vocab, then allow abbreviation-only reuse later."
  - "Normalize function/statistics progression so terminology appears locally before dense symbolic use: Chapter 8 should glossary linear/direct/inverse/quadratic terms before heavy formulas; Chapter 9 should glossary mean/median/mode/range/variance/frequency/probability before compact notation."
  - "Preferred whole-book dependency order for tool reuse: arithmetic/counting -> factors/fractions/ratio -> geometry basics -> number line/rational -> real numbers -> variables/expressions -> equation intuition -> algebra deepening -> congruence -> similarity -> geometry extensions -> function models -> data/statistics."
  - "When later fixes touch examples or review chapters, forbid abbreviation-only insertions unless the abbreviation already has a glossary definition in the same or earlier chapter."

