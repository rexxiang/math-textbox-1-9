name: Build Math Textbook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Typst Docker image
        run: docker build -t math-textbook-typst .

      - name: Build PDF
        run: |
          mkdir -p output
          docker run --rm -v "$(pwd):/book" math-textbook-typst \
            compile --root /book /book/typst/main.typ /book/output/math-textbook.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: math-textbook-pdf
          path: output/math-textbook.pdf

      - name: Verify package lock
        run: |
          mkdir -p output
          docker run --rm -v "$(pwd):/book" math-textbook-typst \
            compile --root /book /book/typst/smoke/package-lock.typ /book/output/typst-package-lock-check.pdf
