<!-- 描述：三角形ABC中从A作角平分线交BC于D，标注相关角和线段 -->
<svg xmlns="http://www.w3.org/2000/svg" width="340" height="270" viewBox="0 0 340 270">
  <style>
    text { font-size: 14px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Triangle ABC: A(170,30), B(40,220), C(300,220) -->
  <polygon points="170,30 40,220 300,220" stroke="black" stroke-width="1.5" fill="none"/>

  <!-- Vertices -->
  <circle cx="170" cy="30" r="3"/>
  <circle cx="40" cy="220" r="3"/>
  <circle cx="300" cy="220" r="3"/>
  <text x="164" y="20">A</text>
  <text x="24" y="235">B</text>
  <text x="303" y="235">C</text>

  <!-- Angle bisector from A to D on BC -->
  <!-- D is midpoint of BC = (170,220) -->
  <line x1="170" y1="30" x2="170" y2="220" stroke="black" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="170" cy="220" r="3"/>
  <text x="172" y="240">D</text>

  <!-- Equal angle marks at A (bisected angle) -->
  <path d="M 152,47 A 22,22 0 0,1 166,29" stroke="#d00" stroke-width="1.8" fill="none"/>
  <path d="M 174,29 A 22,22 0 0,1 188,47" stroke="#d00" stroke-width="1.8" fill="none"/>
  <text x="138" y="62" fill="#d00" font-size="12">α</text>
  <text x="183" y="62" fill="#d00" font-size="12">α</text>

  <!-- Equal side marks AB = AC -->
  <line x1="96" y1="120" x2="110" y2="130" stroke="black" stroke-width="2"/>
  <line x1="230" y1="120" x2="244" y2="130" stroke="black" stroke-width="2"/>

  <!-- Angle at B and C -->
  <path d="M 62,220 A 22,22 0 0,1 55,199" stroke="black" stroke-width="1.5" fill="none"/>
  <path d="M 278,220 A 22,22 0 0,0 285,199" stroke="black" stroke-width="1.5" fill="none"/>
  <text x="28" y="196" font-size="12">∠B</text>
  <text x="282" y="196" font-size="12">∠C</text>

  <!-- Label -->
  <text x="30" y="260" font-size="12">AD为∠BAC的角平分线，AB=AC</text>
</svg>
