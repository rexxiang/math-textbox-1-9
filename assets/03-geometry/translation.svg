<!-- 描述：三角形平移变换，△ABC平移到△A'B'C'，虚线连接对应点，箭头表示平移向量 -->
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="260" viewBox="0 0 420 260">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    polygon { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Original triangle ABC: A(60,50), B(40,170), C(160,170) -->
  <polygon points="60,50 40,170 160,170" stroke="black" stroke-width="1.8" fill="rgba(200,220,255,0.4)"/>
  <circle cx="60" cy="50" r="3"/>
  <circle cx="40" cy="170" r="3"/>
  <circle cx="160" cy="170" r="3"/>
  <text x="55" y="40">A</text>
  <text x="24" y="182">B</text>
  <text x="163" y="182">C</text>

  <!-- Translated triangle A'B'C': shift by (180,0) -->
  <polygon points="240,50 220,170 340,170" stroke="black" stroke-width="1.8" fill="rgba(255,220,200,0.4)" stroke-dasharray="none"/>
  <circle cx="240" cy="50" r="3"/>
  <circle cx="220" cy="170" r="3"/>
  <circle cx="340" cy="170" r="3"/>
  <text x="243" y="40">A'</text>
  <text x="204" y="182">B'</text>
  <text x="343" y="182">C'</text>

  <!-- Dashed lines connecting corresponding vertices -->
  <line x1="60" y1="50" x2="240" y2="50" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="40" y1="170" x2="220" y2="170" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="160" y1="170" x2="340" y2="170" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Translation vector arrow -->
  <line x1="80" y1="220" x2="240" y2="220" stroke="black" stroke-width="2"/>
  <polygon points="240,220 228,215 228,225" fill="black" stroke="none"/>
  <text x="145" y="214" text-anchor="middle" font-size="12">平移向量</text>
  <text x="145" y="245" text-anchor="middle" font-size="12">△ABC → △A'B'C'（平移）</text>
</svg>
