<!-- 描述：灯塔俯角问题：悬崖高h，水平距离d，俯角α，tan α=h/d -->
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="300" viewBox="0 0 420 300">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
    rect { stroke: black; stroke-width: 1.5; fill: none; }
    polygon { fill: black; stroke: none; }
  </style>

  <!-- Sea level (horizontal base) -->
  <line x1="30" y1="220" x2="400" y2="220" stroke="black" stroke-width="1.5"/>
  <!-- Water texture hint -->
  <line x1="30" y1="230" x2="400" y2="230" stroke="#88c" stroke-width="0.8" stroke-dasharray="8,5"/>
  <line x1="30" y1="240" x2="400" y2="240" stroke="#88c" stroke-width="0.8" stroke-dasharray="8,5"/>

  <!-- Cliff: vertical from (100,220) up to (100,60) -->
  <line x1="100" y1="60" x2="100" y2="220" stroke="black" stroke-width="2"/>
  <!-- Cliff base label -->
  <text x="30" y="245">海平面</text>

  <!-- Lighthouse at top of cliff (100,60) -->
  <circle cx="100" cy="60" r="4"/>
  <text x="60" y="52">灯塔 L</text>

  <!-- Ship S on sea (360,220) -->
  <circle cx="360" cy="220" r="4"/>
  <text x="364" y="238">船 S</text>

  <!-- Horizontal line from lighthouse -->
  <line x1="100" y1="60" x2="390" y2="60" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="392" y="57" font-size="11">水平</text>

  <!-- Line of sight from lighthouse to ship -->
  <line x1="100" y1="60" x2="360" y2="220"/>
  <polygon points="360,220 349,210 357,206"/>

  <!-- Depression angle arc -->
  <path d="M 140,60 A 40,40 0 0,1 128,94"/>
  <text x="148" y="82" fill="#d00" font-size="14">α</text>

  <!-- Height label h -->
  <line x1="65" y1="60" x2="65" y2="220" stroke="black" stroke-width="1"/>
  <polygon points="65,60 60,72 70,72"/>
  <polygon points="65,220 60,208 70,208"/>
  <text x="30" y="148" font-size="13">h</text>

  <!-- Horizontal distance d -->
  <line x1="100" y1="250" x2="360" y2="250" stroke="black" stroke-width="1"/>
  <polygon points="100,250 112,245 112,255"/>
  <polygon points="360,250 348,245 348,255"/>
  <text x="220" y="270" font-size="13" text-anchor="middle">d</text>

  <!-- Right angle at base of cliff on sea level -->
  <rect x="100" y="206" width="14" height="14"/>

  <!-- Formula -->
  <text x="200" y="90" font-size="14" fill="#d00">tan α = h / d</text>
</svg>
