<!-- 描述：三角形外角定理：三角形的一个外角等于两个不相邻内角之和 -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
    polygon { fill: black; stroke: none; }
  </style>

  <!-- Triangle ABC: A(80,50), B(40,210), C(280,210) -->
  <polygon points="80,50 40,210 280,210" stroke="black" stroke-width="1.5" fill="none"/>
  <circle cx="80" cy="50" r="3"/>
  <circle cx="40" cy="210" r="3"/>
  <circle cx="280" cy="210" r="3"/>
  <text x="74" y="40">A</text>
  <text x="22" y="225">B</text>
  <text x="283" y="225">C</text>

  <!-- Extend BC beyond C to point D(360,210) -->
  <line x1="280" y1="210" x2="370" y2="210" stroke="black" stroke-width="1.5"/>
  <polygon points="370,210 358,205 358,215"/>
  <text x="355" y="225">D</text>

  <!-- Interior angle α at A -->
  <path d="M 66,67 A 22,22 0 0,1 90,60" stroke="#d00" stroke-width="1.8" fill="none"/>
  <text x="52" y="80" fill="#d00">α</text>

  <!-- Interior angle β at B -->
  <path d="M 62,210 A 22,22 0 0,1 55,188" stroke="#00a" stroke-width="1.8" fill="none"/>
  <text x="43" y="192" fill="#00a">β</text>

  <!-- Exterior angle γ at C (angle ACD) -->
  <path d="M 304,210 A 25,25 0 0,0 295,187" stroke="#080" stroke-width="1.8" fill="none"/>
  <text x="308" y="197" fill="#080">γ</text>

  <!-- Interior angle at C (angle ACB) -->
  <path d="M 258,210 A 22,22 0 0,0 267,189" stroke="gray" stroke-width="1.5" fill="none"/>
  <text x="248" y="192" fill="gray" font-size="12">∠C</text>

  <!-- Theorem statement -->
  <text x="40" y="250" font-size="13" fill="#080">γ</text>
  <text x="60" y="250" font-size="13"> = </text>
  <text x="75" y="250" font-size="13" fill="#d00">α</text>
  <text x="90" y="250" font-size="13"> + </text>
  <text x="103" y="250" font-size="13" fill="#00a">β</text>
  <text x="40" y="270" font-size="12">（外角 = 不相邻两内角之和）</text>
</svg>
