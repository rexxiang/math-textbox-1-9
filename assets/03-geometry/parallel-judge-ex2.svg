<!-- 描述：截线截两直线，内错角相等判断两直线平行 -->
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="280" viewBox="0 0 360 280">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    polygon { fill: black; stroke: none; }
  </style>

  <!-- Line l1 at y=90 -->
  <line x1="30" y1="90" x2="320" y2="90"/>
  <text x="325" y="95">l₁</text>

  <!-- Line l2 at y=200 -->
  <line x1="30" y1="200" x2="320" y2="200"/>
  <text x="325" y="205">l₂</text>

  <!-- Transversal from (100,20) to (240,270) -->
  <line x1="100" y1="20" x2="240" y2="270"/>

  <!-- Intersection with l1 ≈ (149, 90) -->
  <!-- Intersection with l2 ≈ (198, 200) -->

  <!-- Angle ∠3 at l1 (below-left of intersection) = internal angle -->
  <path d="M 127,90 A 22,22 0 0,0 138,111" stroke="#d00" stroke-width="1.8" fill="none"/>
  <text x="108" y="114" fill="#d00">∠3</text>

  <!-- Angle ∠6 at l2 (above-right of intersection) = internal angle on other side -->
  <path d="M 221,200 A 22,22 0 0,0 210,179" stroke="#d00" stroke-width="1.8" fill="none"/>
  <text x="220" y="180" fill="#d00">∠6</text>

  <!-- Equal marks on the two angles -->
  <text x="100" y="120" fill="#d00" font-size="12">= 50°</text>
  <text x="218" y="169" fill="#d00" font-size="12">= 50°</text>

  <!-- Conclusion -->
  <text x="30" y="245" font-size="13">∠3 = ∠6（内错角相等）</text>
  <text x="30" y="265" font-size="13">∴ l₁ ∥ l₂</text>
</svg>
