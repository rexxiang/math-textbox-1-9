<!-- 描述：圆心角∠AOB和圆周角∠ACB，∠AOB=2∠ACB，同弧AB -->
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="320" viewBox="0 0 360 320">
  <style>
    text { font-size: 14px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { stroke: black; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Circle centered at O(180,160) radius 120 -->
  <circle cx="180" cy="160" r="120"/>
  <circle cx="180" cy="160" r="3" style="fill:black; stroke:none;"/>
  <text x="185" y="157">O</text>

  <!-- Points A and B on circle (symmetric around top) -->
  <!-- A at angle 210° from center: x=180+120*cos(210°)=180-103.9≈76, y=160+120*sin(210°)=160-60=220 -->
  <!-- Actually let's place A at lower-left and B at lower-right for clarity -->
  <!-- A at 220°: x=180+120*cos(220°)=180-91.9≈88, y=160+120*sin(220°)=160+77.1≈237 -->
  <!-- B at 320°: x=180+120*cos(320°)=180+91.9≈272, y=160+120*sin(320°)=160-77.1≈83 -->
  <!-- Let's use: A(80,237), B(272,83), C at top (180,40) -->
  <circle cx="80" cy="237" r="3" style="fill:black; stroke:none;"/>
  <circle cx="272" cy="83" r="3" style="fill:black; stroke:none;"/>
  <circle cx="180" cy="40" r="3" style="fill:black; stroke:none;"/>
  <text x="62" y="253">A</text>
  <text x="277" y="80">B</text>
  <text x="182" y="32">C</text>

  <!-- Central angle AOB -->
  <line x1="180" y1="160" x2="80" y2="237"/>
  <line x1="180" y1="160" x2="272" y2="83"/>
  <path d="M 156,172 A 30,30 0 0,1 193,141" stroke="#d00" stroke-width="1.8" fill="none"/>
  <text x="155" y="195" fill="#d00" font-size="12">∠AOB</text>

  <!-- Inscribed angle ACB -->
  <line x1="180" y1="40" x2="80" y2="237"/>
  <line x1="180" y1="40" x2="272" y2="83"/>
  <path d="M 165,60 A 25,25 0 0,1 196,52" stroke="#00a" stroke-width="1.8" fill="none"/>
  <text x="140" y="52" fill="#00a" font-size="12">∠ACB</text>

  <!-- Arc AB (the arc subtended) -->
  <path d="M 80,237 A 120,120 0 0,0 272,83" stroke="#080" stroke-width="2.5" fill="none"/>

  <!-- Label -->
  <text x="50" y="295" font-size="13" fill="#d00">∠AOB</text>
  <text x="115" y="295" font-size="13"> = 2 × </text>
  <text x="185" y="295" font-size="13" fill="#00a">∠ACB</text>
</svg>
