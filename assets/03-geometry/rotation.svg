<!-- 描述：三角形绕中心O旋转一定角度，△ABC变为△A'B'C'，弧线表示旋转路径 -->
<svg xmlns="http://www.w3.org/2000/svg" width="380" height="320" viewBox="0 0 380 320">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    polygon { stroke: black; stroke-width: 1.5; fill: none; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Center of rotation O -->
  <circle cx="190" cy="170" r="4"/>
  <text x="196" y="168">O</text>

  <!-- Original triangle: A(100,80), B(80,170), C(170,170) -->
  <polygon points="100,80 80,170 170,170" fill="rgba(200,220,255,0.4)"/>
  <circle cx="100" cy="80" r="3"/>
  <circle cx="80" cy="170" r="3"/>
  <circle cx="170" cy="170" r="3"/>
  <text x="84" y="72">A</text>
  <text x="62" y="182">B</text>
  <text x="173" y="182">C</text>

  <!-- Rotated triangle ~60°: rotate each point around O by 60° -->
  <!-- OA = (100-190, 80-170) = (-90,-90), |OA|=127.3 -->
  <!-- Rotate 60°: x'=x*cos60-y*sin60=-90*0.5-(-90)*0.866=-45+77.9=32.9 -->
  <!--             y'=x*sin60+y*cos60=-90*0.866+(-90)*0.5=-77.9-45=-122.9 -->
  <!-- A' = O+(32.9,-122.9) = (222.9, 47.1) ≈ (223,47) -->
  <!-- OB = (80-190, 170-170) = (-110, 0), rotate 60°: x'=-55, y'=-95.3 -->
  <!-- B' = O+(-55,-95.3) = (135, 74.7) ≈ (135,75) -->
  <!-- OC = (170-190, 170-170) = (-20,0), rotate 60°: x'=-10, y'=-17.3 -->
  <!-- C' = O+(-10,-17.3) = (180, 152.7) ≈ (180,153) -->
  <polygon points="223,47 135,75 180,153" fill="rgba(255,220,200,0.4)"/>
  <circle cx="223" cy="47" r="3"/>
  <circle cx="135" cy="75" r="3"/>
  <circle cx="180" cy="153" r="3"/>
  <text x="226" y="42">A'</text>
  <text x="118" y="72">B'</text>
  <text x="183" y="148">C'</text>

  <!-- Rotation arcs from A to A' (arc around O) -->
  <!-- OA distance ≈ 127.3 -->
  <!-- arc from A(100,80) to A'(223,47) around O(190,170), radius 127.3 -->
  <path d="M 100,80 A 127,127 0 0,1 223,47" stroke="#d00" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <polygon points="223,47 214,55 221,61" fill="#d00" stroke="none"/>

  <!-- Arc from B to B' radius=110 -->
  <path d="M 80,170 A 110,110 0 0,1 135,75" stroke="#00a" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>

  <!-- Rotation angle arc near O -->
  <path d="M 165,163 A 30,30 0 0,1 186,142" stroke="#080" stroke-width="1.8" fill="none"/>
  <text x="138" y="148" fill="#080" font-size="12">60°</text>

  <!-- Labels -->
  <text x="240" y="200" font-size="12">绕O旋转60°</text>
  <text x="50" y="295" font-size="12">△ABC → △A'B'C'（旋转变换）</text>
</svg>
