<!-- 描述：两圆的五种位置关系：外离、外切、相交、内切、内含 -->
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="220" viewBox="0 0 500 220">
  <style>
    text { font-size: 12px; font-family: sans-serif; }
    circle { stroke: black; stroke-width: 1.5; fill: none; }
  </style>

  <!-- 1. 外离 (two separate circles) -->
  <circle cx="35" cy="85" r="25"/>
  <circle cx="75" cy="85" r="20"/>
  <text x="55" y="130" text-anchor="middle">外离</text>

  <!-- 2. 外切 (externally tangent) -->
  <circle cx="135" cy="85" r="30"/>
  <circle cx="185" cy="85" r="20"/>
  <circle cx="165" cy="85" r="3" style="fill:black; stroke:none;"/>
  <text x="160" y="130" text-anchor="middle">外切</text>

  <!-- 3. 相交 (two intersection points) -->
  <circle cx="240" cy="85" r="35"/>
  <circle cx="275" cy="85" r="35"/>
  <!-- intersection points approximate at (257.5, 55) and (257.5, 115) -->
  <circle cx="257" cy="55" r="3" style="fill:black; stroke:none;"/>
  <circle cx="257" cy="115" r="3" style="fill:black; stroke:none;"/>
  <text x="258" y="140" text-anchor="middle">相交</text>

  <!-- 4. 内切 (internally tangent) -->
  <circle cx="370" cy="85" r="38"/>
  <circle cx="379" cy="85" r="29"/>
  <!-- tangent point at left: (332, 85) -->
  <circle cx="332" cy="85" r="3" style="fill:black; stroke:none;"/>
  <text x="370" y="140" text-anchor="middle">内切</text>

  <!-- 5. 内含 (one inside the other) -->
  <circle cx="455" cy="85" r="38"/>
  <circle cx="455" cy="85" r="20"/>
  <text x="455" y="140" text-anchor="middle">内含</text>

  <!-- Bottom labels row 2 -->
  <text x="55" y="155" text-anchor="middle" font-size="11">d&gt;r₁+r₂</text>
  <text x="160" y="155" text-anchor="middle" font-size="11">d=r₁+r₂</text>
  <text x="258" y="160" text-anchor="middle" font-size="11">|r₁-r₂|&lt;d&lt;r₁+r₂</text>
  <text x="370" y="155" text-anchor="middle" font-size="11">d=|r₁-r₂|</text>
  <text x="455" y="155" text-anchor="middle" font-size="11">d&lt;|r₁-r₂|</text>
</svg>
