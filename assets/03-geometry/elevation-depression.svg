<!-- 描述：仰角（从水平向上到高点）与俯角（从水平向下到低点）示意图 -->
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="280" viewBox="0 0 420 280">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
    polygon { fill: black; stroke: none; }
  </style>

  <!-- Observer at middle height (200,160) -->
  <circle cx="200" cy="160" r="5"/>
  <text x="183" y="178">观察点</text>

  <!-- Horizontal reference line through observer -->
  <line x1="60" y1="160" x2="380" y2="160" stroke="black" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="364" y="155" font-size="11">水平线</text>

  <!-- High target point (top, upper-right) -->
  <circle cx="340" cy="60" r="4"/>
  <text x="345" y="56">高点 T</text>

  <!-- Line of sight to high point -->
  <line x1="200" y1="160" x2="340" y2="60"/>
  <polygon points="340,60 330,70 325,62"/>

  <!-- Elevation angle arc -->
  <path d="M 240,160 A 40,40 0 0,0 228,121"/>
  <text x="248" y="145" fill="#d00" font-size="13">仰角 α</text>

  <!-- Low target point (lower-right) -->
  <circle cx="340" cy="240" r="4"/>
  <text x="344" y="255">低点 S</text>

  <!-- Line of sight to low point -->
  <line x1="200" y1="160" x2="340" y2="240"/>
  <polygon points="340,240 325,235 330,245"/>

  <!-- Depression angle arc -->
  <path d="M 237,160 A 40,40 0 0,1 222,196"/>
  <text x="248" y="192" fill="#00a" font-size="13">俯角 β</text>

  <!-- Labels -->
  <text x="30" y="250" font-size="12">仰角：视线在水平线上方的夹角</text>
  <text x="30" y="270" font-size="12">俯角：视线在水平线下方的夹角</text>
</svg>
