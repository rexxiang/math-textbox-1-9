<!-- 描述：直线与圆的三种位置关系：相交（2点）、相切（1点）、相离（0点） -->
<svg xmlns="http://www.w3.org/2000/svg" width="460" height="200" viewBox="0 0 460 200">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    circle { stroke: black; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Case 1: 相交 (2 intersection points) -->
  <circle cx="80" cy="90" r="50"/>
  <line x1="20" y1="70" x2="150" y2="110"/>
  <circle cx="44" cy="77" r="3" style="fill:black; stroke:none;"/>
  <circle cx="116" cy="103" r="3" style="fill:black; stroke:none;"/>
  <text x="50" y="165" text-anchor="middle">相交</text>
  <text x="50" y="182" text-anchor="middle" font-size="11">（2个公共点）</text>

  <!-- Case 2: 相切 (1 tangent point) -->
  <circle cx="230" cy="90" r="50"/>
  <line x1="170" y1="140" x2="295" y2="140"/>
  <circle cx="230" cy="140" r="3" style="fill:black; stroke:none;"/>
  <text x="232" y="165" text-anchor="middle">相切</text>
  <text x="232" y="182" text-anchor="middle" font-size="11">（1个公共点）</text>

  <!-- Case 3: 相离 (no intersection) -->
  <circle cx="390" cy="90" r="50"/>
  <line x1="330" y1="160" x2="455" y2="160"/>
  <text x="392" y="182" text-anchor="middle">相离</text>
  <text x="392" y="165" text-anchor="middle">（无公共点）</text>
</svg>
