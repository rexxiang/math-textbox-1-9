<!-- 描述：坐标平面中A(x₁,y₁)和B(x₂,y₂)，中点M及其坐标公式 -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="320" viewBox="0 0 400 320">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    circle { fill: black; stroke: none; }
    polygon { fill: black; stroke: none; }
  </style>

  <!-- Axes -->
  <line x1="30" y1="250" x2="380" y2="250"/>
  <polygon points="380,250 368,245 368,255"/>
  <text x="384" y="255">x</text>
  <line x1="60" y1="290" x2="60" y2="20"/>
  <polygon points="60,20 55,32 65,32"/>
  <text x="64" y="16">y</text>
  <circle cx="60" cy="250" r="3"/>
  <text x="42" y="266">O</text>

  <!-- Point A(1,4) → pixel (110,50) using scale: x=60+50*px, y=250-50*py -->
  <!-- A at coordinate (1,4): px=110, py=50 -->
  <circle cx="110" cy="50" r="4"/>
  <text x="90" y="43">A(x₁,y₁)</text>

  <!-- Point B(5,2) → pixel (310,150) -->
  <circle cx="310" cy="150" r="4"/>
  <text x="315" y="145">B(x₂,y₂)</text>

  <!-- Midpoint M at ((1+5)/2,(4+2)/2)=(3,3) → pixel(210,100) -->
  <circle cx="210" cy="100" r="4"/>
  <text x="215" y="93">M</text>

  <!-- Line AB -->
  <line x1="110" y1="50" x2="310" y2="150" stroke="black" stroke-width="1.5"/>

  <!-- Dashed lines for A -->
  <line x1="110" y1="50" x2="110" y2="250" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="110" y1="50" x2="60" y2="50" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Dashed lines for B -->
  <line x1="310" y1="150" x2="310" y2="250" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="310" y1="150" x2="60" y2="150" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Dashed lines for M -->
  <line x1="210" y1="100" x2="210" y2="250" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="210" y1="100" x2="60" y2="100" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Axis tick labels -->
  <text x="105" y="268" font-size="11">x₁</text>
  <text x="205" y="268" font-size="11">(x₁+x₂)/2</text>
  <text x="305" y="268" font-size="11">x₂</text>
  <text x="10" y="54" font-size="11">y₁</text>
  <text x="10" y="104" font-size="11">(y₁+y₂)/2</text>
  <text x="10" y="154" font-size="11">y₂</text>

  <!-- Formula box -->
  <rect x="100" y="180" width="260" height="50" stroke="black" stroke-width="1.5" fill="rgba(255,255,220,0.8)"/>
  <text x="115" y="200" font-size="13">M = ( (x₁+x₂)/2 , (y₁+y₂)/2 )</text>
  <text x="150" y="220" font-size="12">中点坐标公式</text>
</svg>
