<!-- 描述：直角三角形定义三角函数：sinθ=对边/斜边，cosθ=邻边/斜边，tanθ=对边/邻边 -->
<svg xmlns="http://www.w3.org/2000/svg" width="460" height="260" viewBox="0 0 460 260">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    polygon { stroke: black; stroke-width: 1.5; fill: none; }
    rect { stroke: black; stroke-width: 1.5; fill: rgba(255,255,220,0.9); }
    circle { fill: black; stroke: none; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Right triangle: right angle at C(60,220), A(60,60), B(220,220) -->
  <polygon points="60,60 60,220 220,220"/>
  <circle cx="60" cy="60" r="3"/>
  <circle cx="60" cy="220" r="3"/>
  <circle cx="220" cy="220" r="3"/>
  <text x="43" y="52">A</text>
  <text x="41" y="238">C</text>
  <text x="223" y="236">B</text>

  <!-- Right angle mark at C -->
  <rect x="60" y="204" width="14" height="16" fill="none"/>

  <!-- Label theta at A -->
  <path d="M 60,85 A 25,25 0 0,1 80,68" fill="none"/>
  <text x="66" y="100" font-size="14">θ</text>

  <!-- Labels on sides -->
  <!-- c = AB (hypotenuse) -->
  <text x="118" y="125" transform="rotate(-47,118,125)" font-size="13">c（斜边）</text>
  <!-- a = BC (opposite side, horizontal) -->
  <text x="120" y="240" font-size="13">a（对边）</text>
  <!-- b = AC (adjacent side, vertical) -->
  <text x="20" y="148" font-size="13" transform="rotate(-90,20,148)">b（邻边）</text>

  <!-- Definition box -->
  <rect x="250" y="50" width="200" height="140"/>
  <text x="260" y="75" font-size="14">sin θ = a/c</text>
  <text x="260" y="100" font-size="14">cos θ = b/c</text>
  <text x="260" y="125" font-size="14">tan θ = a/b</text>
  <line x1="255" y1="108" x2="445" y2="108" stroke="black" stroke-width="0.8"/>
  <text x="258" y="152" font-size="12">对/斜  邻/斜  对/邻</text>
  <text x="258" y="175" font-size="12">（SOH-CAH-TOA）</text>
</svg>
