<!-- 描述：两个直角三角形展示斜边-直角边（HL）全等，等斜边双刻度，等直角边单刻度 -->
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="200" viewBox="0 0 420 200">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Right triangle 1: right angle at C1 (40,160), A1(40,40), B1(180,160) -->
  <polygon points="40,40 40,160 180,160" stroke="black" stroke-width="1.5" fill="none"/>
  <circle cx="40" cy="40" r="3"/>
  <circle cx="40" cy="160" r="3"/>
  <circle cx="180" cy="160" r="3"/>
  <text x="25" y="35">A</text>
  <text x="22" y="178">C</text>
  <text x="183" y="175">B</text>
  <!-- Right angle mark at C1 -->
  <rect x="40" y="144" width="14" height="16" stroke="black" stroke-width="1.5" fill="none"/>
  <!-- 1 tick on AC (leg) -->
  <line x1="33" y1="97" x2="47" y2="97" stroke="black" stroke-width="2"/>
  <!-- 2 ticks on AB (hypotenuse) -->
  <line x1="103" y1="98" x2="113" y2="103"/>
  <line x1="98" y1="103" x2="108" y2="108"/>

  <!-- Right triangle 2: right angle at F (250,160), D(250,40), E(380,160) -->
  <polygon points="250,40 250,160 380,160" stroke="black" stroke-width="1.5" fill="none"/>
  <circle cx="250" cy="40" r="3"/>
  <circle cx="250" cy="160" r="3"/>
  <circle cx="380" cy="160" r="3"/>
  <text x="235" y="35">D</text>
  <text x="232" y="178">F</text>
  <text x="383" y="175">E</text>
  <!-- Right angle mark at F -->
  <rect x="250" y="144" width="14" height="16" stroke="black" stroke-width="1.5" fill="none"/>
  <!-- 1 tick on DF (leg) -->
  <line x1="243" y1="97" x2="257" y2="97" stroke="black" stroke-width="2"/>
  <!-- 2 ticks on DE (hypotenuse) -->
  <line x1="310" y1="98" x2="320" y2="103"/>
  <line x1="305" y1="103" x2="315" y2="108"/>

  <!-- Label -->
  <text x="90" y="30" font-size="13">△ABC ≅ △DEF（斜边直角边 HL）</text>
</svg>
