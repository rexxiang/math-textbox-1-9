<!-- 描述：两平行线被截线所截，清晰标注∠1,∠5同位角；∠3,∠6内错角；∠3,∠5同旁内角 -->
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="320" viewBox="0 0 420 320">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
  </style>

  <!-- l1 at y=90 -->
  <line x1="30" y1="90" x2="340" y2="90"/>
  <text x="345" y="95">l₁</text>

  <!-- l2 at y=210 -->
  <line x1="30" y1="210" x2="340" y2="210"/>
  <text x="345" y="215">l₂</text>

  <!-- Parallel marks -->
  <text x="178" y="78" font-size="16">//</text>
  <text x="178" y="198" font-size="16">//</text>

  <!-- Transversal from (100,20) to (260,290) -->
  <line x1="100" y1="20" x2="260" y2="290"/>

  <!-- P1 = intersection with l1: solve y=90, line parametric:
       x=100+t*160, y=20+t*270 → t=(90-20)/270=70/270≈0.259 → x≈141.5 -->
  <!-- P2 = intersection with l2: t=(210-20)/270=190/270≈0.704 → x≈212.6 -->

  <!-- At P1 (≈142, 90): angles ∠1(upper-left), ∠2(upper-right), ∠3(lower-left), ∠4(lower-right) -->
  <path d="M 119,90 A 23,23 0 0,1 131,69" stroke="#d00" stroke-width="1.8" fill="none"/>
  <text x="100" y="78" fill="#d00">∠1</text>

  <path d="M 163,90 A 23,23 0 0,0 151,69" stroke="black" stroke-width="1.5" fill="none"/>
  <text x="156" y="76">∠2</text>

  <path d="M 119,90 A 23,23 0 0,0 131,111" stroke="#00a" stroke-width="1.8" fill="none"/>
  <text x="98" y="113" fill="#00a">∠3</text>

  <path d="M 163,90 A 23,23 0 0,1 151,111" stroke="black" stroke-width="1.5" fill="none"/>
  <text x="156" y="113">∠4</text>

  <!-- At P2 (≈213, 210): angles ∠5(upper-left), ∠6(upper-right), ∠7(lower-left), ∠8(lower-right) -->
  <path d="M 190,210 A 23,23 0 0,1 202,189" stroke="#d00" stroke-width="1.8" fill="none"/>
  <text x="170" y="198" fill="#d00">∠5</text>

  <path d="M 236,210 A 23,23 0 0,0 224,189" stroke="#080" stroke-width="1.8" fill="none"/>
  <text x="228" y="197" fill="#080">∠6</text>

  <path d="M 190,210 A 23,23 0 0,0 202,231" stroke="black" stroke-width="1.5" fill="none"/>
  <text x="170" y="232">∠7</text>

  <path d="M 236,210 A 23,23 0 0,1 224,231" stroke="black" stroke-width="1.5" fill="none"/>
  <text x="228" y="232">∠8</text>

  <!-- Legend -->
  <text x="20" y="265" fill="#d00" font-size="13">∠1 = ∠5 同位角（对应角）</text>
  <text x="20" y="285" fill="#00a" font-size="13">∠3 = ∠6 内错角（交错内角）</text>
  <text x="20" y="305" fill="#080" font-size="13">∠3 + ∠5 = 180° 同旁内角</text>
</svg>
