<!-- 描述：平行四边形ABCD，标注对边平行符号、对角线、对角相等弧线 -->
<svg xmlns="http://www.w3.org/2000/svg" width="380" height="260" viewBox="0 0 380 260">
  <style>
    text { font-size: 14px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Parallelogram ABCD: A(80,50), B(300,50), C(340,200), D(120,200) -->
  <polygon points="80,50 300,50 340,200 120,200" stroke="black" stroke-width="1.5" fill="none"/>

  <!-- Vertices -->
  <circle cx="80" cy="50" r="3"/>
  <circle cx="300" cy="50" r="3"/>
  <circle cx="340" cy="200" r="3"/>
  <circle cx="120" cy="200" r="3"/>
  <text x="64" y="45">A</text>
  <text x="303" y="45">B</text>
  <text x="343" y="216">C</text>
  <text x="103" y="216">D</text>

  <!-- Parallel marks on AB and DC -->
  <line x1="183" y1="44" x2="188" y2="56" stroke="black" stroke-width="1.5"/>
  <line x1="189" y1="44" x2="194" y2="56" stroke="black" stroke-width="1.5"/>
  <line x1="223" y1="194" x2="228" y2="206" stroke="black" stroke-width="1.5"/>
  <line x1="229" y1="194" x2="234" y2="206" stroke="black" stroke-width="1.5"/>

  <!-- Parallel marks on AD and BC -->
  <line x1="96" y1="119" x2="109" y2="125" stroke="black" stroke-width="1.5"/>
  <line x1="313" y1="119" x2="326" y2="125" stroke="black" stroke-width="1.5"/>

  <!-- Diagonals -->
  <line x1="80" y1="50" x2="340" y2="200" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="300" y1="50" x2="120" y2="200" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Center point O -->
  <circle cx="210" cy="125" r="3"/>
  <text x="215" y="120">O</text>

  <!-- Equal diagonal halves tick marks -->
  <line x1="139" y1="81" x2="152" y2="88" stroke="black" stroke-width="2"/>
  <line x1="269" y1="162" x2="282" y2="169" stroke="black" stroke-width="2"/>
  <line x1="267" y1="80" x2="258" y2="92" stroke="black" stroke-width="2"/>
  <line x1="152" y1="160" x2="143" y2="172" stroke="black" stroke-width="2"/>

  <!-- Angle marks at A and C (opposite, equal) -->
  <path d="M 102,50 A 22,22 0 0,1 88,69" stroke="#d00" stroke-width="1.5" fill="none"/>
  <path d="M 318,200 A 22,22 0 0,1 332,181" stroke="#d00" stroke-width="1.5" fill="none"/>

  <!-- Angle marks at B and D (opposite, equal) -->
  <path d="M 278,50 A 22,22 0 0,0 290,69" stroke="#00a" stroke-width="1.5" fill="none"/>
  <path d="M 142,200 A 22,22 0 0,0 130,181" stroke="#00a" stroke-width="1.5" fill="none"/>

  <text x="50" y="245" font-size="12">AB∥DC，AD∥BC；∠A=∠C，∠B=∠D</text>
</svg>
