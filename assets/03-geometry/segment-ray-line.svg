<!-- 描述：三行分别展示线段、射线、直线，带中文标签 -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <style>
    text { font-size: 14px; font-family: sans-serif; }
    line, path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Row 1: 线段 (segment AB) -->
  <circle cx="80" cy="50" r="3"/>
  <line x1="80" y1="50" x2="280" y2="50"/>
  <circle cx="280" cy="50" r="3"/>
  <text x="74" y="40" text-anchor="middle">A</text>
  <text x="286" y="40" text-anchor="middle">B</text>
  <text x="200" y="80" text-anchor="middle">线段</text>

  <!-- Row 2: 射线 (ray from A through B) -->
  <circle cx="80" cy="115" r="3"/>
  <line x1="80" y1="115" x2="290" y2="115"/>
  <!-- arrowhead -->
  <polygon points="290,115 280,110 280,120" fill="black" stroke="none"/>
  <text x="74" y="105" text-anchor="middle">A</text>
  <text x="275" y="105" text-anchor="middle">B</text>
  <text x="200" y="145" text-anchor="middle">射线</text>

  <!-- Row 3: 直线 (line through A and B, arrows both ends) -->
  <line x1="70" y1="175" x2="310" y2="175"/>
  <!-- left arrowhead -->
  <polygon points="70,175 80,170 80,180" fill="black" stroke="none"/>
  <!-- right arrowhead -->
  <polygon points="310,175 300,170 300,180" fill="black" stroke="none"/>
  <circle cx="150" cy="175" r="3"/>
  <circle cx="250" cy="175" r="3"/>
  <text x="150" y="165" text-anchor="middle">A</text>
  <text x="250" y="165" text-anchor="middle">B</text>
  <text x="370" y="180" text-anchor="middle">直线</text>
</svg>
