<!-- 描述：中心对称，图形绕中心O旋转180°，P与P'关于O对称，O为中点 -->
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="300" viewBox="0 0 360 300">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    polygon { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Center O -->
  <circle cx="180" cy="150" r="4"/>
  <text x="186" y="148">O</text>

  <!-- Original triangle: A(80,70), B(60,150), C(140,150) -->
  <polygon points="80,70 60,150 140,150" fill="rgba(200,220,255,0.4)"/>
  <circle cx="80" cy="70" r="3"/>
  <circle cx="60" cy="150" r="3"/>
  <circle cx="140" cy="150" r="3"/>
  <text x="64" y="62">A</text>
  <text x="42" y="162">B</text>
  <text x="143" y="162">C</text>

  <!-- Rotated 180° triangle: A'=2O-A=(280,230), B'=2O-B=(300,150), C'=2O-C=(220,150) -->
  <polygon points="280,230 300,150 220,150" fill="rgba(255,220,200,0.4)"/>
  <circle cx="280" cy="230" r="3"/>
  <circle cx="300" cy="150" r="3"/>
  <circle cx="220" cy="150" r="3"/>
  <text x="283" y="244">A'</text>
  <text x="303" y="162">B'</text>
  <text x="207" y="162">C'</text>

  <!-- Lines through O connecting corresponding points -->
  <line x1="80" y1="70" x2="280" y2="230" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="60" y1="150" x2="300" y2="150" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="140" y1="150" x2="220" y2="150" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Tick marks on A-O and O-A' showing O is midpoint -->
  <line x1="176" y1="145" x2="184" y2="155" stroke="black" stroke-width="2"/>
  <line x1="171" y1="148" x2="179" y2="158" stroke="black" stroke-width="2"/>

  <text x="50" y="280" font-size="12">△ABC 与 △A'B'C' 关于O中心对称</text>
</svg>
