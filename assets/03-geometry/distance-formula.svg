<!-- 描述：坐标平面中A(1,1)和B(4,5)，直角三角形展示两点间距离公式 -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="320" viewBox="0 0 400 320">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    circle { fill: black; stroke: none; }
    polygon { fill: black; stroke: none; }
    rect { stroke: black; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Axes: origin at (60,260), scale 40px per unit -->
  <line x1="30" y1="260" x2="370" y2="260"/>
  <polygon points="370,260 358,255 358,265"/>
  <text x="374" y="265">x</text>
  <line x1="60" y1="290" x2="60" y2="20"/>
  <polygon points="60,20 55,32 65,32"/>
  <text x="64" y="16">y</text>
  <circle cx="60" cy="260" r="3"/>
  <text x="42" y="276">O</text>

  <!-- Grid lines -->
  <g stroke="#eee" stroke-width="0.8">
    <line x1="100" y1="20" x2="100" y2="280"/>
    <line x1="140" y1="20" x2="140" y2="280"/>
    <line x1="180" y1="20" x2="180" y2="280"/>
    <line x1="220" y1="20" x2="220" y2="280"/>
    <line x1="260" y1="20" x2="260" y2="280"/>
    <line x1="60" y1="220" x2="370" y2="220"/>
    <line x1="60" y1="180" x2="370" y2="180"/>
    <line x1="60" y1="140" x2="370" y2="140"/>
    <line x1="60" y1="100" x2="370" y2="100"/>
  </g>

  <!-- A(1,1): pixel (100,220), B(4,5): pixel (220,60) -->
  <circle cx="100" cy="220" r="4"/>
  <text x="82" y="215">A(1,1)</text>
  <circle cx="220" cy="60" r="4"/>
  <text x="224" y="55">B(4,5)</text>

  <!-- Hypotenuse AB -->
  <line x1="100" y1="220" x2="220" y2="60" stroke="black" stroke-width="2"/>

  <!-- Right triangle: horizontal leg to (220,220), vertical leg up to (220,60) -->
  <line x1="100" y1="220" x2="220" y2="220" stroke="black" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="220" y1="220" x2="220" y2="60" stroke="black" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Right angle mark at (220,220) -->
  <rect x="206" y="206" width="14" height="14"/>

  <!-- Labels on legs and hypotenuse -->
  <text x="153" y="238" font-size="12" text-anchor="middle">|x₂-x₁|=3</text>
  <text x="238" y="145" font-size="12">|y₂-y₁|=4</text>
  <text x="140" y="130" font-size="12">d = 5</text>

  <!-- Formula box -->
  <rect x="60" y="275" width="320" height="38" stroke="black" stroke-width="1.5" fill="rgba(255,255,220,0.9)"/>
  <text x="65" y="291" font-size="13">d = √[(x₂-x₁)²+(y₂-y₁)²]</text>
  <text x="65" y="308" font-size="12">= √(9+16) = √25 = 5</text>
</svg>
