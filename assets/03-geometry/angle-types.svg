<!-- 描述：四种角并排展示：锐角、直角（带直角标记）、钝角、平角，各有中文标签 -->
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="180" viewBox="0 0 500 180">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line, path, rect { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- 锐角 (~45°) -->
  <g transform="translate(30,30)">
    <line x1="0" y1="90" x2="70" y2="90"/>
    <line x1="0" y1="90" x2="50" y2="20"/>
    <circle cx="0" cy="90" r="3" style="fill:black"/>
    <path d="M 22,90 A 22,22 0 0,0 15.6,67" stroke="black" stroke-width="1.5" fill="none"/>
    <text x="-5" y="140" text-anchor="middle">锐角</text>
    <text x="10" y="130" font-size="12">&lt;90°</text>
  </g>

  <!-- 直角 (90°) -->
  <g transform="translate(145,30)">
    <line x1="0" y1="90" x2="70" y2="90"/>
    <line x1="0" y1="90" x2="0" y2="20"/>
    <circle cx="0" cy="90" r="3" style="fill:black"/>
    <!-- right angle mark -->
    <rect x="0" y="72" width="14" height="18" stroke="black" stroke-width="1.5" fill="none"/>
    <text x="5" y="140" text-anchor="middle">直角</text>
    <text x="12" y="130" font-size="12">=90°</text>
  </g>

  <!-- 钝角 (~120°) -->
  <g transform="translate(255,30)">
    <line x1="50" y1="90" x2="120" y2="90"/>
    <line x1="50" y1="90" x2="10" y2="20"/>
    <circle cx="50" cy="90" r="3" style="fill:black"/>
    <path d="M 74,90 A 24,24 0 0,0 38,66" stroke="black" stroke-width="1.5" fill="none"/>
    <text x="55" y="140" text-anchor="middle">钝角</text>
    <text x="38" y="130" font-size="12">&gt;90°</text>
  </g>

  <!-- 平角 (180°) -->
  <g transform="translate(380,30)">
    <line x1="-10" y1="90" x2="100" y2="90"/>
    <line x1="40" y1="90" x2="40" y2="20"/>
    <circle cx="40" cy="90" r="3" style="fill:black"/>
    <path d="M 65,90 A 25,25 0 0,0 15,90" stroke="black" stroke-width="1.5" fill="none"/>
    <text x="40" y="140" text-anchor="middle">平角</text>
    <text x="25" y="130" font-size="12">=180°</text>
  </g>
</svg>
