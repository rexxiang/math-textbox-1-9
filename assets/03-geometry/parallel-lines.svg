<!-- 描述：两条平行线被截线所截，标注同位角、内错角、同旁内角各一对示例 -->
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="300" viewBox="0 0 420 300">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
  </style>

  <!-- l1: horizontal line y=80 -->
  <line x1="40" y1="80" x2="320" y2="80"/>
  <text x="325" y="85">l₁</text>

  <!-- l2: horizontal line y=200 -->
  <line x1="40" y1="200" x2="320" y2="200"/>
  <text x="325" y="205">l₂</text>

  <!-- Parallel marks on l1 and l2 -->
  <line x1="168" y1="74" x2="178" y2="86" stroke="black" stroke-width="1.5"/>
  <line x1="162" y1="74" x2="172" y2="86" stroke="black" stroke-width="1.5"/>
  <line x1="168" y1="194" x2="178" y2="206" stroke="black" stroke-width="1.5"/>
  <line x1="162" y1="194" x2="172" y2="206" stroke="black" stroke-width="1.5"/>

  <!-- Transversal: from (80,20) to (260,270) -->
  <line x1="80" y1="20" x2="260" y2="270"/>

  <!-- Intersection with l1: approximately x=130, y=80 -->
  <!-- Intersection with l2: approximately x=210, y=200 -->

  <!-- Angle arcs at l1 intersection (~130,80) -->
  <!-- ∠1 above-left -->
  <path d="M 108,80 A 22,22 0 0,1 119,59" stroke="#e44" stroke-width="1.8" fill="none"/>
  <text x="95" y="68" fill="#e44">∠1</text>

  <!-- ∠3 below-left (same side) -->
  <path d="M 119,101 A 22,22 0 0,0 108,80" stroke="blue" stroke-width="1.8" fill="none"/>
  <text x="93" y="106" fill="blue">∠3</text>

  <!-- Angle arcs at l2 intersection (~210,200) -->
  <!-- ∠5 above-left -->
  <path d="M 188,200 A 22,22 0 0,1 199,179" stroke="#e44" stroke-width="1.8" fill="none"/>
  <text x="174" y="188" fill="#e44">∠5</text>

  <!-- ∠6 above-right -->
  <path d="M 199,179 A 22,22 0 0,1 232,200" stroke="#080" stroke-width="1.8" fill="none"/>
  <text x="213" y="188" fill="#080">∠6</text>

  <!-- ∠7 below-right -->
  <path d="M 232,200 A 22,22 0 0,1 221,221" stroke="purple" stroke-width="1.8" fill="none"/>
  <text x="230" y="228" fill="purple">∠7</text>

  <!-- Legend -->
  <text x="30" y="248" fill="#e44" font-size="13">∠1=∠5 同位角</text>
  <text x="30" y="268" fill="blue" font-size="13">∠3=∠6 内错角</text>
  <text x="30" y="288" fill="purple" font-size="13">∠3+∠5=180° 同旁内角</text>
</svg>
