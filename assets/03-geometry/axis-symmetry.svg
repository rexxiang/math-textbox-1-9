<!-- 描述：图形关于轴的对称，原图与镜像，垂线段连接对应点，等长标记 -->
<svg xmlns="http://www.w3.org/2000/svg" width="380" height="280" viewBox="0 0 380 280">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    polygon { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Axis of symmetry: vertical line x=190 -->
  <line x1="190" y1="20" x2="190" y2="260" stroke="black" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="192" y="18" font-size="12">对称轴</text>

  <!-- Original triangle: A(80,50), B(60,190), C(160,190) -->
  <polygon points="80,50 60,190 160,190" fill="rgba(200,220,255,0.4)"/>
  <circle cx="80" cy="50" r="3"/>
  <circle cx="60" cy="190" r="3"/>
  <circle cx="160" cy="190" r="3"/>
  <text x="64" y="42">A</text>
  <text x="42" y="204">B</text>
  <text x="163" y="204">C</text>

  <!-- Reflected triangle: A'(300,50), B'(320,190), C'(220,190) -->
  <!-- Reflection: x' = 2*190 - x = 380 - x -->
  <polygon points="300,50 320,190 220,190" fill="rgba(255,220,200,0.4)"/>
  <circle cx="300" cy="50" r="3"/>
  <circle cx="320" cy="190" r="3"/>
  <circle cx="220" cy="190" r="3"/>
  <text x="303" y="42">A'</text>
  <text x="323" y="204">B'</text>
  <text x="207" y="204">C'</text>

  <!-- Perpendicular connector lines (dashed) from A to A' through axis -->
  <line x1="80" y1="50" x2="300" y2="50" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="190" x2="320" y2="190" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="160" y1="190" x2="220" y2="190" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Equal marks -->
  <line x1="133" y1="46" x2="133" y2="54" stroke="black" stroke-width="2"/>
  <line x1="247" y1="46" x2="247" y2="54" stroke="black" stroke-width="2"/>

  <text x="100" y="258" font-size="12">点到对称轴距离相等</text>
</svg>
