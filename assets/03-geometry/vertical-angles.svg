<!-- 描述：两直线相交形成4个角，对顶角∠1与∠3相等，∠2与∠4相等，带标记 -->
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="280" viewBox="0 0 320 280">
  <style>
    text { font-size: 14px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Two intersecting lines through center (160,140) -->
  <!-- Line 1: top-left to bottom-right -->
  <line x1="50" y1="40" x2="270" y2="240"/>
  <!-- Line 2: top-right to bottom-left -->
  <line x1="270" y1="40" x2="50" y2="240"/>

  <!-- Angle arcs -->
  <!-- ∠1 (top, between lines) -->
  <path d="M 160,115 A 25,25 0 0,1 185,140" stroke="black" stroke-width="1.5" fill="none"/>
  <!-- ∠3 (bottom, vertical to ∠1) -->
  <path d="M 160,165 A 25,25 0 0,1 135,140" stroke="black" stroke-width="1.5" fill="none"/>
  <!-- ∠2 (right) -->
  <path d="M 185,140 A 25,25 0 0,1 160,165" stroke="black" stroke-width="1.5" fill="none"/>
  <!-- ∠4 (left) -->
  <path d="M 135,140 A 25,25 0 0,1 160,115" stroke="black" stroke-width="1.5" fill="none"/>

  <!-- Labels -->
  <text x="168" y="125">∠1</text>
  <text x="188" y="148">∠2</text>
  <text x="118" y="162">∠3</text>
  <text x="118" y="138">∠4</text>

  <!-- Equal marks -->
  <text x="200" y="50" font-size="13">∠1 = ∠3（对顶角）</text>
  <text x="200" y="75" font-size="13">∠2 = ∠4（对顶角）</text>
</svg>
