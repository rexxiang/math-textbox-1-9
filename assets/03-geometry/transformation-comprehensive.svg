<!-- 描述：综合变换图示：旗形依次经历平移→轴对称→旋转三种变换，各步骤标注 -->
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="280" viewBox="0 0 500 280">
  <style>
    text { font-size: 12px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    polygon { stroke: black; stroke-width: 1.5; fill: none; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Step 1: Original flag shape (left) -->
  <!-- Flag: pole at (40,60)-(40,160), flag at (40,60)-(100,80)-(40,100) -->
  <g id="flag1">
    <line x1="40" y1="60" x2="40" y2="160"/>
    <polygon points="40,60 100,80 40,100" fill="rgba(200,220,255,0.5)"/>
  </g>
  <text x="30" y="185">①原图</text>

  <!-- Arrow: 平移 -->
  <line x1="110" y1="110" x2="155" y2="110"/>
  <polygon points="155,110 145,105 145,115" fill="black" stroke="none"/>
  <text x="105" y="103" font-size="11">平移</text>

  <!-- Step 2: Translated flag -->
  <g id="flag2">
    <line x1="175" y1="60" x2="175" y2="160"/>
    <polygon points="175,60 235,80 175,100" fill="rgba(255,230,200,0.5)"/>
  </g>
  <text x="158" y="185">②平移后</text>

  <!-- Arrow: 轴对称 -->
  <line x1="245" y1="110" x2="290" y2="110"/>
  <polygon points="290,110 280,105 280,115" fill="black" stroke="none"/>
  <text x="240" y="103" font-size="11">轴对称</text>
  <!-- Symmetry axis -->
  <line x1="268" y1="55" x2="268" y2="175" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Step 3: Reflected flag (flip horizontally around x=268) -->
  <!-- Original flag2 pole at x=175, flag pts 175,60 235,80 175,100 -->
  <!-- Reflection about x=268: x'=2*268-x=536-x -->
  <!-- Pole: (536-175,y)=(361,y)-(536-175,y)=(361,y) -->
  <!-- Flag points: (536-175,60)=(361,60), (536-235,80)=(301,80), (536-175,100)=(361,100) -->
  <g id="flag3">
    <line x1="361" y1="60" x2="361" y2="160"/>
    <polygon points="361,60 301,80 361,100" fill="rgba(200,255,200,0.5)"/>
  </g>
  <text x="338" y="185">③对称后</text>

  <!-- Arrow: 旋转 -->
  <line x1="375" y1="110" x2="420" y2="110"/>
  <polygon points="420,110 410,105 410,115" fill="black" stroke="none"/>
  <text x="374" y="103" font-size="11">旋转</text>

  <!-- Step 4: Rotated flag 90° around (440,110) -->
  <!-- Original flag3 pole at x=361 from y=60 to y=160. After 90° CW rotation around (440,110): -->
  <!-- (x,y) → (440+(y-110), 110-(x-440)) = (y+330, 550-x) -->
  <!-- Pole: (60+330,550-361)=(390,189) to (160+330,550-361)=(490,189) — horizontal -->
  <!-- Flag pts: (60+330,550-361)=(390,189),(80+330,550-301)=(410,249),(100+330,550-361)=(430,189) -->
  <g id="flag4">
    <line x1="390" y1="189" x2="490" y2="189"/>
    <polygon points="390,189 410,249 430,189" fill="rgba(255,200,255,0.5)"/>
  </g>
  <text x="405" y="270">④旋转后</text>

  <text x="10" y="258" font-size="11">平移 → 轴对称 → 旋转</text>
</svg>
