<!-- 描述：梯形中画高h，从上底垂直到下底，带直角标记，标注高=h -->
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="220" viewBox="0 0 360 220">
  <style>
    text { font-size: 14px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    circle { fill: black; stroke: none; }
    rect { stroke: black; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Trapezoid: A(50,180), B(310,180), C(250,60), D(110,60) -->
  <polygon points="50,180 310,180 250,60 110,60" stroke="black" stroke-width="1.5" fill="none"/>

  <!-- Vertices -->
  <circle cx="50" cy="180" r="3"/>
  <circle cx="310" cy="180" r="3"/>
  <circle cx="250" cy="60" r="3"/>
  <circle cx="110" cy="60" r="3"/>
  <text x="33" y="195">A</text>
  <text x="313" y="195">B</text>
  <text x="253" y="52">C</text>
  <text x="94" y="52">D</text>

  <!-- Height from D(110,60) perpendicularly down to AB at (110,180) -->
  <line x1="110" y1="60" x2="110" y2="180" stroke="black" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Right angle mark -->
  <rect x="110" y="164" width="14" height="16"/>
  <!-- Foot -->
  <circle cx="110" cy="180" r="3"/>

  <!-- Height label -->
  <text x="70" y="125">高 = h</text>
  <!-- Arrow with h -->
  <line x1="100" y1="65" x2="100" y2="175" stroke="black" stroke-width="1" stroke-dasharray="2,3"/>
  <!-- Arrow heads for h measurement -->
  <polygon points="100,65 95,75 105,75" fill="black" stroke="none"/>
  <polygon points="100,175 95,165 105,165" fill="black" stroke="none"/>
  <text x="60" y="125">h</text>
</svg>
