<!-- 描述：等腰三角形ABC，AB=AC（等号标记），顶角高AM平分底BC，标注∠B=∠C -->
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="280" viewBox="0 0 320 280">
  <style>
    text { font-size: 14px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Isosceles triangle: A at top, B bottom-left, C bottom-right -->
  <polygon points="160,30 40,220 280,220" stroke="black" stroke-width="1.5" fill="none"/>

  <!-- Vertices -->
  <circle cx="160" cy="30" r="3"/>
  <circle cx="40" cy="220" r="3"/>
  <circle cx="280" cy="220" r="3"/>
  <text x="154" y="20">A</text>
  <text x="24" y="235">B</text>
  <text x="283" y="235">C</text>

  <!-- Tick marks on equal sides AB and AC -->
  <!-- AB midpoint ~(100,125) -->
  <line x1="93" y1="121" x2="107" y2="129" stroke="black" stroke-width="2"/>
  <!-- AC midpoint ~(220,125) -->
  <line x1="213" y1="121" x2="227" y2="129" stroke="black" stroke-width="2"/>

  <!-- Altitude/median from A to M on BC -->
  <line x1="160" y1="30" x2="160" y2="220" stroke="black" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Right angle mark at M -->
  <rect x="160" y="205" width="13" height="15" stroke="black" stroke-width="1.5" fill="none"/>
  <!-- M midpoint of BC -->
  <circle cx="160" cy="220" r="3"/>
  <text x="164" y="240">M</text>

  <!-- Equal tick marks on BM and MC -->
  <line x1="92" y1="217" x2="100" y2="223" stroke="black" stroke-width="2"/>
  <line x1="218" y1="217" x2="226" y2="223" stroke="black" stroke-width="2"/>

  <!-- Angle arcs at B and C -->
  <path d="M 62,220 A 22,22 0 0,1 55,199" stroke="black" stroke-width="1.5" fill="none"/>
  <path d="M 258,220 A 22,22 0 0,0 265,199" stroke="black" stroke-width="1.5" fill="none"/>

  <!-- Labels -->
  <text x="28" y="192">∠B</text>
  <text x="268" y="192">∠C</text>
  <text x="90" y="260" font-size="13">AB = AC，∠B = ∠C</text>
</svg>
