<!-- 描述：四边形家族层次图：平行四边形→矩形、菱形→正方形，用方框和箭头连接 -->
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="300" viewBox="0 0 420 300">
  <style>
    text { font-size: 14px; font-family: sans-serif; }
    rect { stroke: black; stroke-width: 1.5; fill: white; }
    line { stroke: black; stroke-width: 1.5; }
    polygon { fill: black; stroke: none; }
  </style>

  <!-- Top: 平行四边形 -->
  <rect x="130" y="20" width="160" height="40" rx="4"/>
  <text x="210" y="46" text-anchor="middle">平行四边形</text>

  <!-- Arrow down-left to 矩形 -->
  <line x1="175" y1="60" x2="115" y2="130"/>
  <polygon points="115,130 122,118 126,128"/>

  <!-- Arrow down-right to 菱形 -->
  <line x1="245" y1="60" x2="305" y2="130"/>
  <polygon points="305,130 294,122 304,118"/>

  <!-- 矩形 box -->
  <rect x="50" y="130" width="130" height="40" rx="4"/>
  <text x="115" y="156" text-anchor="middle">矩形</text>
  <text x="115" y="175" text-anchor="middle" font-size="11">（有直角）</text>

  <!-- 菱形 box -->
  <rect x="240" y="130" width="130" height="40" rx="4"/>
  <text x="305" y="156" text-anchor="middle">菱形</text>
  <text x="305" y="175" text-anchor="middle" font-size="11">（四边相等）</text>

  <!-- Arrow from 矩形 down to 正方形 -->
  <line x1="115" y1="190" x2="180" y2="240"/>
  <polygon points="180,240 173,228 183,226"/>

  <!-- Arrow from 菱形 down to 正方形 -->
  <line x1="305" y1="190" x2="240" y2="240"/>
  <polygon points="240,240 243,228 253,228"/>

  <!-- 正方形 box -->
  <rect x="140" y="240" width="140" height="40" rx="4"/>
  <text x="210" y="266" text-anchor="middle">正方形</text>
  <text x="210" y="285" text-anchor="middle" font-size="11">（矩形 ∩ 菱形）</text>
</svg>
