<!-- 描述：圆的各元素：圆心O、半径r、直径d、弦、弧，带中文标签 -->
<svg xmlns="http://www.w3.org/2000/svg" width="380" height="320" viewBox="0 0 380 320">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { stroke: black; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Main circle -->
  <circle cx="185" cy="155" r="100"/>

  <!-- Center O -->
  <circle cx="185" cy="155" r="3" style="fill:black; stroke:none;"/>
  <text x="191" y="152">O</text>

  <!-- Radius r: from O to right edge (285,155) -->
  <line x1="185" y1="155" x2="285" y2="155" stroke="black" stroke-width="1.5"/>
  <text x="225" y="148">r（半径）</text>

  <!-- Diameter d: from (85,155) through O to (285,155) -->
  <line x1="85" y1="155" x2="185" y2="155" stroke="black" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="95" y="148" font-size="12">d（直径）</text>

  <!-- Chord: line from ~(115,80) to (270,200) (not through center) -->
  <line x1="115" y1="80" x2="270" y2="215" stroke="black" stroke-width="1.5"/>
  <circle cx="115" cy="80" r="3" style="fill:black; stroke:none;"/>
  <circle cx="270" cy="215" r="3" style="fill:black; stroke:none;"/>
  <text x="120" y="68" font-size="12">弦</text>

  <!-- Arc: mark the arc from top to right side with arrow -->
  <path d="M 185,55 A 100,100 0 0,1 285,155" stroke="#d00" stroke-width="2" fill="none"/>
  <text x="275" y="88" fill="#d00">弧</text>

  <!-- Labels pointing -->
  <text x="10" y="290" font-size="12">圆心O  半径r  直径d=2r</text>
  <text x="10" y="312" font-size="12">弦（不过圆心）  弧（圆的一部分）</text>
</svg>
