<!-- 描述：梯形ABCD，AB∥CD，标注上底、下底、腰 -->
<svg xmlns="http://www.w3.org/2000/svg" width="380" height="230" viewBox="0 0 380 230">
  <style>
    text { font-size: 14px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Trapezoid ABCD: A(60,180), B(320,180), C(260,60), D(120,60) -->
  <polygon points="60,180 320,180 260,60 120,60" stroke="black" stroke-width="1.5" fill="none"/>

  <!-- Vertices -->
  <circle cx="60" cy="180" r="3"/>
  <circle cx="320" cy="180" r="3"/>
  <circle cx="260" cy="60" r="3"/>
  <circle cx="120" cy="60" r="3"/>
  <text x="44" y="195">A</text>
  <text x="322" y="195">B</text>
  <text x="262" y="52">C</text>
  <text x="103" y="52">D</text>

  <!-- Parallel marks on AB and DC -->
  <line x1="183" y1="174" x2="188" y2="186" stroke="black" stroke-width="1.5"/>
  <line x1="189" y1="174" x2="194" y2="186" stroke="black" stroke-width="1.5"/>
  <line x1="183" y1="54" x2="188" y2="66" stroke="black" stroke-width="1.5"/>
  <line x1="189" y1="54" x2="194" y2="66" stroke="black" stroke-width="1.5"/>

  <!-- Labels: 下底 AB (below), 上底 CD (above), 腰 AD and BC (sides) -->
  <text x="175" y="205">下底 AB</text>
  <text x="167" y="48">上底 CD</text>
  <text x="55" y="120" transform="rotate(-52,55,120)">腰 AD</text>
  <text x="270" y="135" transform="rotate(52,270,135)">腰 BC</text>
</svg>
