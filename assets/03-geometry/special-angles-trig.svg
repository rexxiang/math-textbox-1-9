<!-- 描述：特殊角三角函数：45-45-90和30-60-90三角形，标注边长和函数值 -->
<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300">
  <style>
    text { font-size: 12px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    polygon { stroke: black; stroke-width: 1.5; fill: none; }
    rect { stroke: black; stroke-width: 1.5; fill: rgba(255,255,220,0.9); }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- 45-45-90 triangle (left): legs=1, hypotenuse=√2 -->
  <!-- C(50,220), A(50,100), B(170,220) -->
  <polygon points="50,100 50,220 170,220"/>
  <circle cx="50" cy="100" r="3"/>
  <circle cx="50" cy="220" r="3"/>
  <circle cx="170" cy="220" r="3"/>
  <text x="35" y="93">A</text>
  <text x="33" y="236">C</text>
  <text x="173" y="236">B</text>
  <!-- Right angle at C -->
  <rect x="50" y="204" width="14" height="16" fill="none"/>
  <!-- Angle marks -->
  <path d="M 50,120 A 20,20 0 0,1 69,108" fill="none"/>
  <text x="57" y="138" font-size="11">45°</text>
  <path d="M 149,220 A 20,20 0 0,0 138,202" fill="none"/>
  <text x="130" y="213" font-size="11">45°</text>
  <!-- Side labels -->
  <text x="24" y="165" font-size="12">1</text>
  <text x="100" y="238" font-size="12">1</text>
  <text x="92" y="155" transform="rotate(-42,92,155)" font-size="12">√2</text>

  <!-- 45° table -->
  <rect x="30" y="248" width="165" height="42"/>
  <text x="35" y="264" font-size="11">sin45°= cos45°= √2/2</text>
  <text x="35" y="282" font-size="11">tan45° = 1</text>

  <!-- 30-60-90 triangle (right): short leg=1, long leg=√3, hyp=2 -->
  <!-- C(260,220), A(260,60), B(400,220) -->
  <polygon points="260,60 260,220 400,220"/>
  <circle cx="260" cy="60" r="3"/>
  <circle cx="260" cy="220" r="3"/>
  <circle cx="400" cy="220" r="3"/>
  <text x="245" y="53">A</text>
  <text x="243" y="236">C</text>
  <text x="403" y="236">B</text>
  <!-- Right angle at C -->
  <rect x="260" y="204" width="14" height="16" fill="none"/>
  <!-- Angle marks -->
  <path d="M 260,80 A 20,20 0 0,1 279,68" fill="none"/>
  <text x="267" y="98" font-size="11">30°</text>
  <path d="M 378,220 A 22,22 0 0,0 367,200" fill="none"/>
  <text x="356" y="212" font-size="11">60°</text>
  <!-- Side labels -->
  <text x="236" y="148" font-size="12">1</text>
  <text x="316" y="238" font-size="12">√3</text>
  <text x="305" y="130" transform="rotate(-49,305,130)" font-size="12">2</text>

  <!-- 30°/60° table -->
  <rect x="245" y="248" width="225" height="42"/>
  <text x="250" y="264" font-size="11">sin30°=1/2  cos30°=√3/2</text>
  <text x="250" y="282" font-size="11">sin60°=√3/2  cos60°=1/2</text>
</svg>
