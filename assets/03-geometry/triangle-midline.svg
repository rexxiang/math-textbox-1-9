<!-- 描述：三角形ABC中，M为AB中点，N为AC中点，MN为中位线，MN∥BC且MN=BC/2 -->
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="260" viewBox="0 0 360 260">
  <style>
    text { font-size: 14px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Triangle ABC: A(180,30), B(40,210), C(320,210) -->
  <polygon points="180,30 40,210 320,210" stroke="black" stroke-width="1.5" fill="none"/>

  <!-- Vertices -->
  <circle cx="180" cy="30" r="3"/>
  <circle cx="40" cy="210" r="3"/>
  <circle cx="320" cy="210" r="3"/>
  <text x="174" y="20">A</text>
  <text x="24" y="225">B</text>
  <text x="323" y="225">C</text>

  <!-- Midpoint M of AB: (110, 120) -->
  <circle cx="110" cy="120" r="4"/>
  <text x="90" y="115">M</text>

  <!-- Midpoint N of AC: (250, 120) -->
  <circle cx="250" cy="120" r="4"/>
  <text x="255" y="115">N</text>

  <!-- Midline MN -->
  <line x1="110" y1="120" x2="250" y2="120" stroke="black" stroke-width="2"/>

  <!-- Parallel marks on MN and BC -->
  <line x1="173" y1="114" x2="178" y2="126" stroke="black" stroke-width="1.5"/>
  <line x1="179" y1="114" x2="184" y2="126" stroke="black" stroke-width="1.5"/>
  <line x1="173" y1="204" x2="178" y2="216" stroke="black" stroke-width="1.5"/>
  <line x1="179" y1="204" x2="184" y2="216" stroke="black" stroke-width="1.5"/>

  <!-- Tick marks showing midpoints -->
  <!-- AM = MB (1 tick each) -->
  <line x1="139" y1="70" x2="152" y2="80" stroke="black" stroke-width="2"/>
  <line x1="67" y1="157" x2="80" y2="167" stroke="black" stroke-width="2"/>
  <!-- AN = NC (2 ticks each) -->
  <line x1="211" y1="72" x2="222" y2="80"/>
  <line x1="215" y1="67" x2="226" y2="75"/>
  <line x1="278" y1="157" x2="289" y2="165"/>
  <line x1="282" y1="152" x2="293" y2="160"/>

  <!-- Label -->
  <text x="60" y="248" font-size="13">MN ∥ BC，MN = ½BC（中位线定理）</text>
</svg>
