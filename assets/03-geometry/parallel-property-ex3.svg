<!-- 描述：两平行线被截线所截，同旁内角互补∠3+∠5=180°，带弧线标记 -->
<svg xmlns="http://www.w3.org/2000/svg" width="380" height="270" viewBox="0 0 380 270">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
  </style>

  <!-- l1 at y=80 -->
  <line x1="30" y1="80" x2="330" y2="80"/>
  <text x="335" y="85">l₁</text>

  <!-- l2 at y=195 -->
  <line x1="30" y1="195" x2="330" y2="195"/>
  <text x="335" y="200">l₂</text>

  <!-- Parallel marks -->
  <line x1="168" y1="74" x2="173" y2="86" stroke="black" stroke-width="1.5"/>
  <line x1="174" y1="74" x2="179" y2="86" stroke="black" stroke-width="1.5"/>
  <line x1="168" y1="189" x2="173" y2="201" stroke="black" stroke-width="1.5"/>
  <line x1="174" y1="189" x2="179" y2="201" stroke="black" stroke-width="1.5"/>

  <!-- Transversal -->
  <line x1="100" y1="20" x2="230" y2="260"/>

  <!-- At l1 (~144,80): ∠3 below-left (interior angle) -->
  <path d="M 122,80 A 22,22 0 0,0 133,101" stroke="#d00" stroke-width="1.8" fill="none"/>
  <text x="100" y="108" fill="#d00">∠3</text>

  <!-- At l2 (~188,195): ∠5 above-left (co-interior, same side) -->
  <path d="M 166,195 A 22,22 0 0,1 177,174" stroke="#00a" stroke-width="1.8" fill="none"/>
  <text x="145" y="183" fill="#00a">∠5</text>

  <!-- Angle value labels -->
  <text x="96" y="124" fill="#d00" font-size="12">（锐角部分）</text>
  <text x="144" y="162" fill="#00a" font-size="12">（钝角部分）</text>

  <!-- Labels -->
  <text x="30" y="230" font-size="13">l₁ ∥ l₂</text>
  <text x="30" y="253" font-size="13" fill="#d00">∠3</text>
  <text x="53" y="253" font-size="13"> + </text>
  <text x="69" y="253" font-size="13" fill="#00a">∠5</text>
  <text x="90" y="253" font-size="13"> = 180°（同旁内角互补）</text>
</svg>
