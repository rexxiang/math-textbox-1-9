<!-- 描述：点P到直线l的多条线段，垂线段PH最短，其余用虚线表示 -->
<svg xmlns="http://www.w3.org/2000/svg" width="380" height="230" viewBox="0 0 380 230">
  <style>
    text { font-size: 14px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Line l -->
  <line x1="30" y1="175" x2="360" y2="175"/>
  <text x="364" y="180">l</text>

  <!-- Point P -->
  <circle cx="190" cy="50" r="3"/>
  <text x="198" y="48">P</text>

  <!-- Other segments from P to various points on l (dashed) -->
  <line x1="190" y1="50" x2="80" y2="175" stroke="black" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="190" y1="50" x2="130" y2="175" stroke="black" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="190" y1="50" x2="270" y2="175" stroke="black" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="190" y1="50" x2="320" y2="175" stroke="black" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Perpendicular PH (solid, shortest) -->
  <line x1="190" y1="50" x2="190" y2="175"/>
  <!-- Right angle mark -->
  <rect x="190" y="160" width="13" height="15" stroke="black" stroke-width="1.5" fill="none"/>

  <!-- Foot H -->
  <circle cx="190" cy="175" r="3"/>
  <text x="196" y="192">H</text>

  <!-- Double tick marks on PH showing shortest -->
  <line x1="184" y1="108" x2="196" y2="108" stroke="black" stroke-width="1.5"/>
  <line x1="184" y1="113" x2="196" y2="113" stroke="black" stroke-width="1.5"/>

  <!-- Label -->
  <text x="200" y="120" font-size="13">PH 最短（垂线段）</text>
</svg>
