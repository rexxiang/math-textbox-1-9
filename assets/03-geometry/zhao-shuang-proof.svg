<!-- 描述：赵爽弦图：大正方形内含4个全等直角三角形围绕中心小正方形，证明勾股定理 -->
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    polygon { stroke: black; stroke-width: 1.5; }
    line { stroke: black; stroke-width: 1.5; }
    rect { stroke: black; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Large outer square with side c (hypotenuse), tilted -->
  <!-- The classic diagram: outer square side=c, inner square side=(a-b), 4 triangles -->
  <!-- Use a=3, b=4 scale x30: a=90, b=120, c=150 -->
  <!-- Place large square: vertices at (180,30), (330,210), (150,330), (0,150) -->
  <!-- Actually: rotate by angle θ where sinθ=b/c=120/150=0.8, cosθ=a/c=90/150=0.6 -->
  <!-- Outer square vertices (centered at 180,180): -->
  <!-- Going clockwise from top: -->
  <!-- v1=(180-c*sinθ, 180-c*cosθ)=(180-120,180-90)=(60,90) -->
  <!-- v2=(180+c*cosθ, 180-c*sinθ)=(180+90,180-120)=(270,60) -->
  <!-- v3=(180+c*sinθ, 180+c*cosθ)=(180+120,180+90)=(300,270) -->
  <!-- v4=(180-c*cosθ, 180+c*sinθ)=(180-90,180+120)=(90,300) -->
  <polygon points="60,90 270,60 300,270 90,300" fill="rgba(240,240,240,0.5)"/>

  <!-- 4 right triangles inside (colored) -->
  <!-- Triangle 1: top-left: v1(60,90), v2(270,60), inner1(?) -->
  <!-- The inner square has vertices at midpoints of hypotenuses. -->
  <!-- Triangles have legs a and b. Along each side of outer square, leg a from one vertex, leg b from next. -->
  <!-- Top edge v1→v2: from v1 go along edge by a=90 → point (60+90*cosφ, 90+90*sinφ) where φ = angle of top edge -->
  <!-- Top edge direction: (270-60,60-90)/150 = (210,-30)/150 = (1.4,-0.2)/1 ... ugh let's just compute: -->
  <!-- Direction v1→v2: (210,-30), length=sqrt(210^2+30^2)=sqrt(44100+900)=sqrt(45000)≈212 — that's not c=150 -->
  <!-- Re-do: scale down. Use a=60, b=80, c=100 for simplicity -->
  <!-- Place outer square of side c=100, centered at (180,180) -->
  <!-- sinθ=b/c=0.8, cosθ=a/c=0.6, θ=53.13° -->
  <!-- v1=(180-80,180-60)=(100,120) -->
  <!-- v2=(180+60,180-80)=(240,100) -->
  <!-- v3=(180+80,180+60)=(260,240) -->
  <!-- v4=(180-60,180+80)=(120,260) -->

  <!-- Redo with better numbers -->
  <!-- Large outer square -->
  <polygon points="100,120 240,100 260,240 120,260" fill="none" stroke="black" stroke-width="2"/>

  <!-- Inner square (side=|a-b|=20, or (b-a)) -->
  <!-- Inner square vertices: from each vertex of outer square, move inward by a along the side -->
  <!-- v1→v2 direction: (140,-20)/length=(140,-20)/sqrt(140^2+20^2)=(140,-20)/sqrt(19600+400)=(140,-20)/141.4 ≈(0.99,-0.141) -->
  <!-- Actually inner square vertices are at: each side split a from one end, b from other -->
  <!-- Top side v1→v2: split point P1 = v1 + a*(v2-v1)/c = (100,120)+60*(140/sqrt(20000),-20/sqrt(20000)) -->
  <!-- sqrt(20000)=141.4, 60*140/141.4=59.4, 60*(-20)/141.4=-8.5, P1≈(159.4, 111.5) -->
  <!-- Approx: P1(159,112), P2 from v2+a*(v3-v2)/c, P3, P4 -->
  <!-- v2→v3: (20,140)/141.4, P2=(240,100)+60*(20/141.4,140/141.4)=(240+8.5,100+59.4)=(248.5,159.4) ≈(248,159) -->
  <!-- v3→v4: (-140,20)/141.4, P3=(260,240)+60*(-140/141.4,20/141.4)=(260-59.4,240+8.5)=(200.6,248.5) ≈(201,248) -->
  <!-- v4→v1: (-20,-140)/141.4, P4=(120,260)+60*(-20/141.4,-140/141.4)=(120-8.5,260-59.4)=(111.5,200.6) ≈(112,201) -->
  <polygon points="159,112 248,159 201,248 112,201" fill="rgba(255,255,180,0.8)" stroke="black" stroke-width="1.5"/>

  <!-- 4 right triangles (shaded differently) -->
  <polygon points="100,120 159,112 112,201" fill="rgba(180,220,255,0.6)" stroke="black" stroke-width="1.5"/>
  <polygon points="240,100 248,159 159,112" fill="rgba(255,200,180,0.6)" stroke="black" stroke-width="1.5"/>
  <polygon points="260,240 201,248 248,159" fill="rgba(180,255,200,0.6)" stroke="black" stroke-width="1.5"/>
  <polygon points="120,260 112,201 201,248" fill="rgba(255,180,255,0.6)" stroke="black" stroke-width="1.5"/>

  <!-- Labels on sides of outer square -->
  <text x="155" y="98">c</text>
  <text x="258" y="175">c</text>
  <text x="155" y="272">c</text>
  <text x="99" y="195">c</text>

  <!-- Labels on triangle legs -->
  <text x="108" y="150" font-size="11">b</text>
  <text x="128" y="108" font-size="11">a</text>

  <!-- Inner square label -->
  <text x="165" y="192" font-size="11">(b-a)²</text>

  <!-- Title and formula -->
  <text x="30" y="320" font-size="13">赵爽弦图：c² = 4×(½ab)+(b-a)²</text>
  <text x="30" y="340" font-size="13">= 2ab+b²-2ab+a² = a²+b²</text>
</svg>
