<!-- 描述：两个全等三角形△ABC和△DEF并排，对应边有刻度标记，对应角有弧线标记 -->
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="220" viewBox="0 0 440 220">
  <style>
    text { font-size: 13px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Triangle ABC (left) -->
  <polygon points="60,180 170,180 110,50" stroke="black" stroke-width="1.5" fill="none"/>
  <circle cx="60" cy="180" r="3"/>
  <circle cx="170" cy="180" r="3"/>
  <circle cx="110" cy="50" r="3"/>
  <text x="44" y="195">B</text>
  <text x="172" y="195">C</text>
  <text x="106" y="40">A</text>

  <!-- 1 tick on AB -->
  <line x1="79" y1="109" x2="92" y2="122" stroke="black" stroke-width="2"/>
  <!-- 2 ticks on BC -->
  <line x1="107" y1="177" x2="113" y2="183"/>
  <line x1="113" y1="177" x2="119" y2="183"/>
  <!-- 3 ticks on AC -->
  <line x1="133" y1="109" x2="144" y2="122"/>
  <line x1="138" y1="105" x2="149" y2="118"/>
  <line x1="143" y1="101" x2="154" y2="114"/>

  <!-- Angle arcs △ABC -->
  <path d="M 82,180 A 22,22 0 0,1 71,159" stroke="black" stroke-width="1.5" fill="none"/>
  <path d="M 148,180 A 22,22 0 0,0 159,159" stroke="black" stroke-width="1.5" fill="none"/>
  <path d="M 97,66 A 18,18 0 0,1 123,66" stroke="black" stroke-width="1.5" fill="none"/>

  <!-- Triangle DEF (right) -->
  <polygon points="265,180 375,180 315,50" stroke="black" stroke-width="1.5" fill="none"/>
  <circle cx="265" cy="180" r="3"/>
  <circle cx="375" cy="180" r="3"/>
  <circle cx="315" cy="50" r="3"/>
  <text x="249" y="195">E</text>
  <text x="377" y="195">F</text>
  <text x="311" y="40">D</text>

  <!-- 1 tick on DE -->
  <line x1="284" y1="109" x2="297" y2="122" stroke="black" stroke-width="2"/>
  <!-- 2 ticks on EF -->
  <line x1="312" y1="177" x2="318" y2="183"/>
  <line x1="318" y1="177" x2="324" y2="183"/>
  <!-- 3 ticks on DF -->
  <line x1="338" y1="109" x2="349" y2="122"/>
  <line x1="343" y1="105" x2="354" y2="118"/>
  <line x1="348" y1="101" x2="359" y2="114"/>

  <!-- Angle arcs △DEF -->
  <path d="M 287,180 A 22,22 0 0,1 276,159" stroke="black" stroke-width="1.5" fill="none"/>
  <path d="M 353,180 A 22,22 0 0,0 364,159" stroke="black" stroke-width="1.5" fill="none"/>
  <path d="M 302,66 A 18,18 0 0,1 328,66" stroke="black" stroke-width="1.5" fill="none"/>

  <!-- Labels -->
  <text x="130" y="210" font-size="12">△ABC ≅ △DEF</text>
</svg>
