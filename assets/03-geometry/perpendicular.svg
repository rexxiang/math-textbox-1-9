<!-- 描述：直线l上方一点P向l作垂线，垂足H，带直角标记，标注垂线段PH -->
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="220" viewBox="0 0 320 220">
  <style>
    text { font-size: 14px; font-family: sans-serif; }
    line { stroke: black; stroke-width: 1.5; }
    path { stroke: black; stroke-width: 1.5; fill: none; }
    circle { fill: black; stroke: none; }
  </style>

  <!-- Line l -->
  <line x1="30" y1="160" x2="300" y2="160"/>
  <text x="305" y="165">l</text>

  <!-- Point P above line -->
  <circle cx="180" cy="50" r="3"/>
  <text x="188" y="48">P</text>

  <!-- Perpendicular from P to H -->
  <line x1="180" y1="50" x2="180" y2="160"/>

  <!-- Foot H -->
  <circle cx="180" cy="160" r="3"/>
  <text x="188" y="176">H</text>

  <!-- Right angle mark at H -->
  <rect x="180" y="144" width="14" height="16" stroke="black" stroke-width="1.5" fill="none"/>

  <!-- Label PH as 垂线段 -->
  <text x="192" y="110">PH（垂线段）</text>

  <!-- Arrow indicating the perpendicular relationship -->
  <text x="50" y="120" font-size="13">PH ⊥ l</text>
</svg>
